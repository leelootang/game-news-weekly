<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>游戏行业日报 | 2026-05-29</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --panel: #ffffff;
      --ink: #17202f;
      --muted: #64748b;
      --line: #dbe3ee;
      --blue: #1769e0;
      --cyan: #00a6c8;
      --green: #11a36a;
      --amber: #d68a00;
      --red: #d34a4a;
      --shadow: 0 14px 36px rgba(24, 39, 75, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
      line-height: 1.6;
    }

    button, input {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
    }

    aside {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 22px 18px;
      background: #0f172a;
      color: #eef5ff;
      border-right: 1px solid rgba(255,255,255,0.08);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.12);
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,0.22);
      background: #ffffff;
      padding: 8px;
    }

    .brand-mark img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }

    .brand-word {
      display: grid;
      gap: 1px;
    }

    .brand-word strong {
      font-size: 17px;
      letter-spacing: 0;
      line-height: 1.1;
    }

    .brand-word span {
      font-size: 12px;
      color: #9fb4d2;
    }

    .nav-title {
      margin: 24px 0 10px;
      color: #9fb4d2;
      font-size: 12px;
      text-transform: uppercase;
    }

    .nav {
      display: grid;
      gap: 8px;
    }

    .nav button {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border: 1px solid transparent;
      background: transparent;
      color: #dce8f8;
      padding: 10px 12px;
      text-align: left;
      cursor: pointer;
    }

    .nav button:hover,
    .nav button.active {
      background: #162640;
      border-color: #2c456b;
    }

    .nav .count {
      min-width: 26px;
      padding: 1px 7px;
      text-align: center;
      color: #05101e;
      background: #99e6f5;
      font-size: 12px;
    }

    .aside-note {
      margin-top: 24px;
      padding: 14px;
      background: #13223b;
      color: #b9c9de;
      font-size: 13px;
      border-left: 3px solid var(--cyan);
    }

    main {
      min-width: 0;
      padding: 28px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: start;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.22;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
    }

    .icon-btn:hover {
      border-color: var(--blue);
      color: var(--blue);
    }

    .search {
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      width: 320px;
      height: 42px;
      padding: 0 12px;
      background: var(--panel);
      border: 1px solid var(--line);
    }

    .search input {
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .metric {
      background: var(--panel);
      border: 1px solid var(--line);
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .metric strong {
      display: block;
      margin-top: 4px;
      font-size: 24px;
      line-height: 1;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: end;
      margin: 22px 0 12px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0;
    }

    .section-head p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .view-toggle {
      display: flex;
      border: 1px solid var(--line);
      background: var(--panel);
    }

    .view-toggle button {
      border: 0;
      background: transparent;
      padding: 8px 12px;
      cursor: pointer;
      color: var(--muted);
    }

    .view-toggle button.active {
      background: #e9f2ff;
      color: var(--blue);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .grid.compact {
      grid-template-columns: 1fr;
    }

    .item {
      background: var(--panel);
      border: 1px solid var(--line);
      padding: 16px;
      min-height: 154px;
      display: grid;
      gap: 12px;
      box-shadow: var(--shadow);
    }

    .item[data-kind="release"] {
      min-height: 120px;
    }

    .item-top {
      display: flex;
      gap: 10px;
      align-items: start;
      justify-content: space-between;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 24px;
      padding: 2px 8px;
      color: #12202f;
      background: #e8edf5;
      font-size: 12px;
      white-space: nowrap;
    }

    .tag.industry { background: #e7f0ff; color: #1555aa; }
    .tag.ai { background: #e8fbff; color: #007891; }
    .tag.release { background: #ecf8ef; color: #0b754a; }
    .tag.discourse { background: #fff4df; color: #955d00; }
    .tag.deep { background: #f1eefb; color: #5b45a5; }

    .item h3 {
      margin: 0;
      font-size: 17px;
      line-height: 1.35;
      letter-spacing: 0;
    }

    .item p {
      margin: 0;
      color: #2f3b4c;
      font-size: 14px;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
    }

    .source-btn {
      justify-self: start;
      border: 1px solid var(--line);
      background: #f8fafc;
      color: #304157;
      padding: 7px 10px;
      cursor: pointer;
      font-size: 13px;
    }

    .source-btn:hover {
      border-color: var(--blue);
      color: var(--blue);
    }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: min(460px, 92vw);
      height: 100vh;
      background: var(--panel);
      border-left: 1px solid var(--line);
      box-shadow: -18px 0 42px rgba(15, 23, 42, 0.18);
      transform: translateX(105%);
      transition: transform 180ms ease;
      z-index: 20;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .drawer.open { transform: translateX(0); }

    .drawer-head {
      padding: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--line);
    }

    .drawer-head h2 {
      margin: 0;
      font-size: 18px;
    }

    .drawer-body {
      padding: 18px;
      overflow: auto;
    }

    .source-list {
      display: grid;
      gap: 12px;
    }

    .source-card {
      border: 1px solid var(--line);
      padding: 12px;
      background: #fbfcff;
    }

    .source-card strong {
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
    }

    .source-url {
      display: block;
      color: var(--blue);
      overflow-wrap: anywhere;
      font-size: 13px;
      user-select: text;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.22);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
      z-index: 10;
    }

    .overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .empty {
      display: none;
      padding: 28px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      background: var(--panel);
    }

    .empty.visible { display: block; }

    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      aside {
        position: relative;
        height: auto;
      }
      .nav { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      main { padding: 20px; }
      .topbar { grid-template-columns: 1fr; }
      .actions { justify-content: space-between; }
      .search { width: min(100%, 360px); }
      .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 560px) {
      .nav { grid-template-columns: 1fr; }
      .metrics { grid-template-columns: 1fr; }
      .actions { flex-direction: column; align-items: stretch; }
      .search { width: 100%; }
      .icon-btn { width: 100%; }
    }
  </style>
</head>

        meta: ["网易", "新版本", "全球发行"],

    const sectionClasses = { industry: "industry", ai: "ai", release: "release", discourse: "discourse", deep: "deep" };
    const sectionLabels = Object.fromEntries(sections.map(s => [s.id, s.label]));
    let currentSection = "all";
    let compact = false;

    const nav = document.getElementById("nav");
    const grid = document.getElementById("items");
    const search = document.getElementById("search");
    const empty = document.getElementById("empty");
    const sectionTitle = document.getElementById("sectionTitle");
    const sectionDesc = document.getElementById("sectionDesc");
    const drawer = document.getElementById("drawer");
    const overlay = document.getElementById("overlay");
    const drawerTitle = document.getElementById("drawerTitle");
    const drawerNote = document.getElementById("drawerNote");
    const sourceList = document.getElementById("sourceList");

    function renderNav() {
      nav.innerHTML = "";
      sections.forEach(section => {
        const count = section.id === "all" ? items.length : items.filter(item => item.section === section.id).length;
        const btn = document.createElement("button");
        btn.className = section.id === currentSection ? "active" : "";
        btn.innerHTML = `<span>${section.label}</span><span class="count">${count}</span>`;
        btn.addEventListener("click", () => {
          currentSection = section.id;
          render();
        });
        nav.appendChild(btn);
      });
    }

    function itemMatches(item, query) {
      if (!query) return true;
      const haystack = [item.title, item.body, item.meta.join(" "), item.sources.map(s => s.join(" ")).join(" ")].join(" ").toLowerCase();
      return haystack.includes(query.toLowerCase());
    }

    function render() {
      renderNav();
      const section = sections.find(s => s.id === currentSection);
      sectionTitle.textContent = section.id === "all" ? "全部条目" : section.label;
      sectionDesc.textContent = section.desc;
      grid.className = compact ? "grid compact" : "grid";
      const query = search.value.trim();
      const filtered = items.filter(item => (currentSection === "all" || item.section === currentSection) && itemMatches(item, query));
      grid.innerHTML = "";
      filtered.forEach(item => grid.appendChild(renderItem(item)));
      empty.classList.toggle("visible", filtered.length === 0);
    }

    function renderItem(item) {
      const node = document.createElement("article");
      node.className = "item";
      node.dataset.kind = item.kind || item.section;
      node.innerHTML = `
        <div class="item-top">
          <span class="tag ${sectionClasses[item.section]}">${sectionLabels[item.section]}</span>
          <span class="meta-row">${item.meta.slice(0, 2).join(" · ")}</span>
        </div>
        <h3>${item.title}</h3>
        <p>${item.body}</p>
        <div class="meta-row">${item.meta.map(m => `<span>${m}</span>`).join("")}</div>
        <button class="source-btn" type="button">查看来源</button>
      `;
      node.querySelector(".source-btn").addEventListener("click", () => openDrawer(item));
      return node;
    }

    function openDrawer(item) {
      drawerTitle.textContent = item.title;
      drawerNote.textContent = item.body;
      sourceList.innerHTML = item.sources.map(([id, name, url]) => `
        <div class="source-card">
          <strong>${id} · ${name}</strong>
          <span class="source-url">${url}</span>
        </div>
      `).join("");
      drawer.classList.add("open");
      overlay.classList.add("open");
    }

    function closeDrawer() {
      drawer.classList.remove("open");
      overlay.classList.remove("open");
    }

    search.addEventListener("input", render);
    document.getElementById("closeDrawer").addEventListener("click", closeDrawer);
    overlay.addEventListener("click", closeDrawer);
    document.getElementById("printBtn").addEventListener("click", () => window.print());
    document.getElementById("viewGrid").addEventListener("click", () => {
      compact = false;
      document.getElementById("viewGrid").classList.add("active");
      document.getElementById("viewList").classList.remove("active");
      render();
    });
    document.getElementById("viewList").addEventListener("click", () => {
      compact = true;
      document.getElementById("viewList").classList.add("active");
      document.getElementById("viewGrid").classList.remove("active");
      render();
    });

    render();
  </script>
