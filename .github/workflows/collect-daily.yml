name: Collect daily game news

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect-daily
  cancel-in-progress: false

jobs:
  collect:
    name: Collect yesterday
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      TZ: Asia/Shanghai
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install collector dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run all collectors for yesterday
        run: python run_daily_collectors.py --preset yesterday --no-progress

      - name: Rebuild article indexes
        run: python scripts/build_article_indexes.py

      - name: Commit collected data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news_data
          if git diff --cached --quiet; then
            echo "No news_data changes to commit."
          else
            RUN_DATE="$(date -d 'yesterday' +'%Y-%m-%d')"
            git commit -m "Collect game news for ${RUN_DATE}"
            git push
          fi
