<head>

  <title>游戏行业日报 | 2026-06-02</title>
  <style>
    :root {
      --bg:#f4f6fb; --panel:#fff; --ink:#15202e; --ink-soft:#2a3a52; --muted:#5b6b82; --line:#e3e8f1; --line-strong:#cdd6e4;
      --shadow-sm:0 1px 2px rgba(15,23,42,.04);
      --shadow:0 6px 20px rgba(24,39,75,.06);
      --shadow-lg:0 18px 44px rgba(24,39,75,.10);
      --industry:#1769e0; --industry-soft:#eaf2ff; --industry-ink:#0e3a82;
      --ai:#00a6c8; --ai-soft:#e1f7fc; --ai-ink:#055466;
      --release:#11a36a; --release-soft:#e4f7ef; --release-ink:#0b5c3d;
      --discourse:#d68a00; --discourse-soft:#fdf2dd; --discourse-ink:#7b4d00;
      --deep:#7866d9; --deep-soft:#eee9fa; --deep-ink:#3f3380;
    }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--ink); font-family:"PingFang SC","Microsoft YaHei","Segoe UI",Arial,sans-serif; line-height:1.65; -webkit-font-smoothing:antialiased; }
    button,input { font:inherit; }
    .app { min-height:100vh; display:grid; grid-template-columns:264px minmax(0,1fr); transition:grid-template-columns .25s cubic-bezier(.4,0,.2,1); }
    .app.collapsed { grid-template-columns:0 minmax(0,1fr); }

    /* Sidebar — softened slate with subtle gradient for less harsh contrast */
    aside.sidebar { position:sticky; top:0; height:100vh; padding:24px 18px; background:linear-gradient(180deg,#283449 0%,#1f2a3d 100%); color:#eef5ff; border-right:1px solid rgba(255,255,255,.06); overflow-y:auto; overflow-x:hidden; transition:transform .25s cubic-bezier(.4,0,.2,1), opacity .2s; }
    .app.collapsed aside.sidebar { transform:translateX(-100%); opacity:0; pointer-events:none; }

    /* Sidebar toggle button (in topbar, always visible) */
    .sidebar-toggle { width:40px; height:40px; border:1px solid var(--line); background:#fff; color:#24415f; cursor:pointer; border-radius:8px; display:grid; place-items:center; font-size:16px; line-height:1; transition:background .12s; }
    .sidebar-toggle:hover { background:#f4f7fc; }
    .sidebar-toggle .icon-open { display:inline; }
    .sidebar-toggle .icon-close { display:none; }
    .app.collapsed .sidebar-toggle .icon-open { display:none; }
    .app.collapsed .sidebar-toggle .icon-close { display:inline; }
    .brand { display:flex; align-items:center; gap:12px; padding-bottom:22px; border-bottom:1px solid rgba(255,255,255,.10); }
    .brand-mark { width:42px; height:42px; display:grid; place-items:center; border-radius:8px; background:#fff; padding:7px; }
    .brand-mark img { width:100%; height:100%; display:block; object-fit:contain; }
    .brand strong { display:block; font-size:16px; line-height:1.1; letter-spacing:.5px; }
    .brand span { display:block; font-size:11.5px; color:#9fb4d2; margin-top:3px; }
    .nav-title { margin:24px 0 10px; color:#7a93b8; font-size:11px; letter-spacing:1.2px; text-transform:uppercase; }
    .nav { display:grid; gap:4px; }
    .nav button { width:100%; display:flex; justify-content:space-between; align-items:center; gap:8px; border:0; background:transparent; color:#c8d6ea; padding:10px 12px; text-align:left; cursor:pointer; border-radius:6px; position:relative; transition:background .12s; }
    .nav button:hover { background:rgba(255,255,255,.05); color:#fff; }
    .nav button.active { background:rgba(255,255,255,.08); color:#fff; }
    .nav button.active::before { content:""; position:absolute; left:0; top:8px; bottom:8px; width:3px; border-radius:0 3px 3px 0; background:var(--accent,#56a8ff); }
    .nav button[data-section="industry"] { --accent:var(--industry); }
    .nav button[data-section="ai"] { --accent:var(--ai); }
    .nav button[data-section="release"] { --accent:var(--release); }
    .nav button[data-section="discourse"] { --accent:var(--discourse); }
    .nav button[data-section="deep"] { --accent:var(--deep); }
    .count { min-width:24px; padding:1px 8px; color:#fff; background:rgba(255,255,255,.15); text-align:center; border-radius:10px; font-size:12px; font-weight:500; }
    .nav button.active .count { background:var(--accent,#56a8ff); color:#fff; }
    .aside-note { margin-top:24px; padding:14px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); border-left:3px solid #4dd0e7; color:#d6e3f5; font-size:12.5px; line-height:1.55; border-radius:0 6px 6px 0; }

    /* Main */
    main { padding:30px 36px 56px; min-width:0; }
    .topbar { display:flex; align-items:flex-start; justify-content:space-between; gap:18px; margin-bottom:24px; padding-bottom:20px; border-bottom:1px solid var(--line); }
    h1 { margin:0; font-size:28px; line-height:1.25; letter-spacing:-.2px; font-weight:600; }
    .subtitle { margin-top:8px; color:var(--muted); font-size:13.5px; }
    .actions { display:flex; gap:10px; align-items:center; }
    .search { width:320px; display:flex; align-items:center; gap:8px; background:#fff; border:1px solid var(--line); padding:9px 13px; border-radius:8px; transition:border-color .15s, box-shadow .15s; }
    .search:focus-within { border-color:var(--industry); box-shadow:0 0 0 3px rgba(23,105,224,.10); }
    .search input { width:100%; border:0; outline:0; background:transparent; color:var(--ink); font-size:13.5px; }
    .icon-btn { border:1px solid var(--line); background:#fff; color:#24415f; cursor:pointer; width:40px; height:40px; border-radius:8px; transition:background .12s; }
    .icon-btn:hover { background:#f4f7fc; }

    /* Metrics */
    .metrics { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:14px; margin-bottom:28px; }
    .metric { background:#fff; border:1px solid var(--line); padding:16px 18px; border-radius:10px; box-shadow:var(--shadow-sm); position:relative; overflow:hidden; }
    .metric::before { content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--accent,var(--industry)); }
    .metric:nth-child(1) { --accent:var(--industry); }
    .metric:nth-child(2) { --accent:var(--release); }
    .metric:nth-child(3) { --accent:var(--discourse); }
    .metric:nth-child(4) { --accent:var(--deep); }
    .metric span { color:var(--muted); font-size:12.5px; letter-spacing:.3px; }
    .metric strong { display:block; font-size:26px; line-height:1.1; margin-top:6px; font-weight:600; }

    /* Section-head (单 section 视图) */
    .section-head { display:flex; justify-content:space-between; gap:16px; align-items:flex-end; margin:6px 0 18px; padding:14px 18px; background:#fff; border:1px solid var(--line); border-left:4px solid var(--accent,var(--industry)); border-radius:8px; box-shadow:var(--shadow-sm); }
    .section-head[data-section="industry"] { --accent:var(--industry); }
    .section-head[data-section="ai"] { --accent:var(--ai); }
    .section-head[data-section="release"] { --accent:var(--release); }
    .section-head[data-section="discourse"] { --accent:var(--discourse); }
    .section-head[data-section="deep"] { --accent:var(--deep); }
    h2 { margin:0; font-size:20px; font-weight:600; }
    .section-head p { margin:4px 0 0; color:var(--muted); font-size:13px; }
    .toggle { display:flex; border:1px solid var(--line); border-radius:7px; overflow:hidden; }
    .toggle button { padding:8px 14px; border:0; background:#fff; color:var(--ink-soft); cursor:pointer; font-size:13px; }
    .toggle button.active { background:var(--industry-soft); color:var(--industry); font-weight:500; }

    /* "全部" 视图下的 section 分块 */
    .section-block { margin-top:36px; }
    .section-block:first-child { margin-top:0; }
    .section-banner { display:flex; align-items:baseline; gap:14px; padding:14px 18px; margin-bottom:14px; background:var(--accent-soft,var(--industry-soft)); border-left:4px solid var(--accent,var(--industry)); border-radius:8px; }
    .section-banner[data-section="industry"] { --accent:var(--industry); --accent-soft:var(--industry-soft); --accent-ink:var(--industry-ink); }
    .section-banner[data-section="ai"] { --accent:var(--ai); --accent-soft:var(--ai-soft); --accent-ink:var(--ai-ink); }
    .section-banner[data-section="release"] { --accent:var(--release); --accent-soft:var(--release-soft); --accent-ink:var(--release-ink); }
    .section-banner[data-section="discourse"] { --accent:var(--discourse); --accent-soft:var(--discourse-soft); --accent-ink:var(--discourse-ink); }
    .section-banner[data-section="deep"] { --accent:var(--deep); --accent-soft:var(--deep-soft); --accent-ink:var(--deep-ink); }
    .section-banner h2 { color:var(--accent-ink); font-size:17px; margin:0; }
    .section-banner .banner-count { color:var(--accent); font-weight:600; font-size:13px; }
    .section-banner .banner-desc { color:var(--accent-ink); opacity:.75; font-size:13px; margin-left:auto; }

    /* Cards */
    .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px; }
    .grid.compact { grid-template-columns:1fr; }
    .item { background:#fff; border:1px solid var(--line); border-left:3px solid var(--accent,var(--industry)); padding:18px 20px; border-radius:8px; box-shadow:var(--shadow-sm); transition:transform .15s, box-shadow .15s, border-color .15s; display:flex; flex-direction:column; }
    .item:hover { box-shadow:var(--shadow); transform:translateY(-1px); }
    .item[data-section="industry"] { --accent:var(--industry); --accent-soft:var(--industry-soft); --accent-ink:var(--industry-ink); }
    .item[data-section="ai"] { --accent:var(--ai); --accent-soft:var(--ai-soft); --accent-ink:var(--ai-ink); }
    .item[data-section="release"] { --accent:var(--release); --accent-soft:var(--release-soft); --accent-ink:var(--release-ink); }
    .item[data-section="discourse"] { --accent:var(--discourse); --accent-soft:var(--discourse-soft); --accent-ink:var(--discourse-ink); }
    .item[data-section="deep"] { --accent:var(--deep); --accent-soft:var(--deep-soft); --accent-ink:var(--deep-ink); }
    .item-top { display:flex; justify-content:space-between; gap:12px; align-items:center; margin-bottom:10px; }
    .tag { padding:3px 10px; font-size:11.5px; color:var(--accent-ink); background:var(--accent-soft); border-radius:11px; font-weight:500; letter-spacing:.2px; }
    h3 { margin:2px 0 10px; font-size:16.5px; line-height:1.45; font-weight:600; color:var(--ink); }
    .item p { margin:0 0 12px; color:var(--ink-soft); font-size:14px; line-height:1.7; }
    .meta-row { display:flex; flex-wrap:wrap; gap:6px; color:var(--muted); font-size:11.5px; }
    .meta-row span { padding:2px 8px; background:#f4f6fb; border-radius:10px; }
    .item .meta-row span.borderline { background:#fff4e0; color:#8a5300; border:1px dashed #e3b66b; }
    .source-btn { margin-top:auto; padding:8px 12px; border:1px solid var(--line); background:#fff; color:var(--accent); cursor:pointer; border-radius:7px; font-size:12.5px; font-weight:500; align-self:flex-start; transition:background .12s, border-color .12s; }
    .source-btn:hover { background:var(--accent-soft); border-color:var(--accent); }
    .empty { display:none; padding:32px; border:1px dashed var(--line); color:var(--muted); text-align:center; background:#fff; border-radius:8px; }
    .empty.visible { display:block; }

    /* Drawer */
    .overlay { position:fixed; inset:0; display:none; background:rgba(15,23,42,.36); backdrop-filter:blur(2px); }
    .overlay.open { display:block; }
    .drawer { position:fixed; top:0; right:0; width:min(440px,100vw); height:100vh; transform:translateX(100%); transition:.22s cubic-bezier(.4,0,.2,1); background:#fff; border-left:1px solid var(--line); box-shadow:-18px 0 44px rgba(15,23,42,.16); padding:24px; overflow:auto; }
    .drawer.open { transform:translateX(0); }
    .drawer-head { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; margin-bottom:8px; }
    .drawer h2 { font-size:17px; line-height:1.4; }
    #drawerNote { color:var(--muted); font-size:13px; line-height:1.65; margin:0 0 18px; padding-bottom:14px; border-bottom:1px solid var(--line); }
    .source-card { border:1px solid var(--line); padding:13px 14px; margin-top:10px; border-radius:7px; background:#fafbfd; }
    .source-card strong { font-size:13px; color:var(--ink); }
    .source-url { display:block; margin-top:6px; color:var(--industry); overflow-wrap:anywhere; user-select:text; font-size:12.5px; text-decoration:none; }
    a.source-url:hover { text-decoration:underline; }
    a.source-url:focus-visible { outline:2px solid var(--industry); outline-offset:2px; border-radius:2px; }

    @media (max-width:900px) {
      .app { grid-template-columns:1fr; }
      aside.sidebar { position:relative; height:auto; }
      .nav { grid-template-columns:repeat(2,minmax(0,1fr)); }
      main { padding:22px 18px 36px; }
      .topbar,.section-head { align-items:stretch; flex-direction:column; }
      .search { width:100%; }
      .metrics,.grid { grid-template-columns:1fr; }
      .section-banner { flex-wrap:wrap; }
      .section-banner .banner-desc { margin-left:0; width:100%; }
    }
    @media print {
      aside.sidebar,.actions,.toggle,.source-btn,.drawer,.overlay { display:none!important; }
      .app { display:block; }
      main { padding:0; }
      .item { break-inside:avoid; box-shadow:none; border-color:#bbb; }
      .section-banner { break-after:avoid; }
    }
  </style>
</head>

    const items = [{"section": "industry", "title": "《王者荣耀世界》S1 创开服畅销榜最高 + 原执行制作人李新平离职", "body": "腾讯《王者荣耀世界》5/29 上线 S1 赛季\"风起苍泱\"，次日冲入 iOS 畅销榜第 15—16 名，超过 S0 开服表现、为公测以来最高位次；同日为原执行制作人李新平在腾讯最后一天，天美 L1 负责人李旻兼任项目制作人，李新平转项目顾问，传将引入前北极光《天涯明月刀》老兵任副制作人。S0 期 DAU 峰值近千万但商业化分层失误（\"没有可以花钱的地方\"）导致流水不达预期；S1 是该产品长线运营的第一道分水岭。", "meta": ["腾讯", "MOBA/竞技", "S1 翻身"], "sources": [["S0021", "《王者玩家玩懂了》？《王者荣耀世界》S1创开服畅销榜最高排名", "http://www.gamelook.com.cn/2026/06/594408/"], ["S0024", "《王者荣耀世界》原执行制作人李新平已离职", "https://cgames.com/contents/2/11718.html"], ["S0189", "[新瓜] 王者荣耀世界更换制作人", "https://bbs.nga.cn/read.php?tid=46883433&forder_by=postdatedesc"]]}, {"section": "industry", "title": "网易 Q1 游戏业务同比增长 7% 至 37 亿美元", "body": "网易 2026 财年 Q1 游戏及增值服务营收 257 亿元（约 37 亿美元），同比增长近 7%，占公司净收入 84%；蛋仔派对、燕云十六声、梦幻西游被点名表现强劲，暴雪在华代理产品维持稳定。毛利润同比增 15%、运营利润同比增 21%，整体游戏业务收入超过云音乐、有道及其他业务总和。", "meta": ["网易", "财报"], "sources": [["S0050", "NetEase's games business grows 7% to $3.7bn in Q1 2026", "https://www.pocketgamer.biz/neteases-games-business-grows-7-to-37bn-in-q1-2026/"]]}, {"section": "industry", "title": "网易海外子公司 Quantic Dream 取消 MMO 项目并启动内部重组", "body": "法国 Quantic Dream（网易子公司）宣布取消 MOBA + 卡组构筑混合作品《Spellcasters Chronicles》，距游戏在 Steam Early Access 上线仅 3 个月；该作首日 Steam 并发峰值仅 888、24 小时回落至 54，评价\"褒贬不一\"。工作室将做内部重组、可能涉及裁员，并把资源转向其他项目。这是网易近年海外业务持续收缩的又一例，叙事驱动单机老厂尝试多人 F2P 的失败案例。", "meta": ["网易", "海外裁员", "F2P 失败"], "sources": [["S0035", "Another NetEase overseas studio has canceled a project and laid off staff", "https://youxichaguan.com/en/archives/197605"]]}, {"section": "industry", "title": "字节代理《境·界 刀鸣》折戟：研发商奥术亏 3146 万、需补偿名臣健康 1 亿", "body": "A 股名臣健康公告：2022 年底以 7270 万收购的奥术网络在 2023—2025 业绩对赌期累计亏损 3146 万，需补偿约 1.04 亿。两张关键 IP 牌均折损：《镇魂街：天生为王》2022 年首周流水破亿但 2024 年 3 月项目解散；字节朝夕光年代理的《死神》IP 手游《境·界 刀鸣》因字节 2023 年游戏业务大收缩被严重延期，字节当年已先付 6000 万开发费。", "meta": ["字节代理", "上市公司", "对赌"], "sources": [["S0018", "字节曾花1亿代理:《境·界 刀鸣》研发商3年亏损3146万、需补偿上市公司1亿", "http://www.gamelook.com.cn/2026/06/594407/"]]}, {"section": "industry", "title": "加州州议会通过 AB1921 \"Stop Killing Games / Protect Our Games Act\"", "body": "加州州议会以 43-16 通过 AB1921\"保护我们的游戏法案\"：要求厂商在关闭依赖服务器的游戏前提前通知玩家，并提供购买后仍可玩的方式（离线、社区服务器或其他可行方案）。推动方是因 Ubisoft 关停《The Crew》并从用户库下架而起的玩家运动 Stop Killing Games。法案现已进入加州参议院，续 6/1 联邦法案后 GaaS 关服政策在州级层面继续推进。", "meta": ["GaaS 政策", "州法案"], "sources": [["S0038", "The California State Assembly passes AB 1921, Stop Killing Games' Protect Our Games Act", "https://www.gamesindustry.biz/the-california-state-assembly-passes-ab-1921-stop-killing-games-protect-our-games-act"]]}, {"section": "industry", "title": "抖音游戏特色人群白皮书：65.3% 流水增量来自上线超 1 年的成熟产品", "body": "巨量引擎游戏行业联合伽马数据发布白皮书：2025 年流水增量 TOP100 移动游戏中，65.3% 的流水来自上线超 1 年的成熟产品，占比高于新品；2025 年合作明星达人的头部手游中近 6 成合作 ≥2 人；达人营销在触达、持续关注、回流、付费 4 环节均影响 >10% 用户；超 6 成下载新游或回流的用户表示受平台因素影响。结论指向\"老游内容营销\"已经从可选项变成必选项。", "meta": ["营销数据", "长线运营"], "sources": [["S0036", "抖音「游戏特色人群」白皮书：6成流水来自老游", "https://youxichaguan.com/archives/197630"]]}, {"section": "industry", "title": "联想被指 G02 复古掌机预装上千款任天堂游戏，公司称为第三方私自添加（borderline）", "body": "海外博主在跨境电商发现\"联想 G02\"复古掌机插入 SD 卡后预装上千款任天堂宝可梦/GB/NES/N64 等 ROM 游戏，外包装含联想 Logo 与正规说明书。联想沟通总监 Jeff Witt 5/23 回应：中国市场出货设备不附带存储卡也不预装任何内容，海外渠道为第三方擅自添加，已要求 AliExpress/Temu 等平台下架，重申 G02 仅在中国销售。任天堂尚未公开回应。", "meta": ["掌机", "IP 风控", "borderline"], "sources": [["S0017", "任天堂被偷家？联想回应G02掌机预装上千款任天堂游戏", "http://www.gamelook.com.cn/2026/06/594436/"]]}, {"section": "industry", "title": "PlayStation 一方游戏销量小幅回升，结束五年下滑（borderline）", "body": "索尼最新数据显示 PlayStation 一方工作室游戏销量出现 modest rebound，此前已连续 5 年下滑。同日分析师 S&P Neil Barbour 指出，CoD MW4 不再支持 Xbox One/PS4 后潜在装机量降至 1.475 亿（同比下滑 5.6%），为 2017 年以来最低；Switch 2 加入虽是首次但短期难以弥补 last-gen 流失。海外主机阵营节奏调整与一方独占复苏走势是观察 3A 大盘的两条平行线。", "meta": ["PlayStation", "主机", "borderline"], "sources": [["S0043", "PlayStation first-party sales see modest rebound after half-decade decline", "https://www.gamesindustry.biz/playstation-first-party-sales-see-modest-rebound-after-half-decade-decline"], ["S0062", "PlayStation first-party game sales show a decline since 2020", "https://www.gamedeveloper.com/business/playstation-first-party-game-sales-are-in-decline"], ["S0071", "PlayStation first-party game sales declined for 5 straight years", "https://www.videogameschronicle.com/news/playstation-first-party-game-sales-declined-for-5-straight-years/"]]}, {"section": "ai", "title": "智能体工具向具体业务场景渗透：Codex 知识工作 + Google AI Studio 应用集成 + Anthropic 关键基础设施扩容", "body": "当日多家头部 AI 公司动作共同指向同一主题。OpenAI 发布《The Next Era of Knowledge Work》报告，明确把 Codex 定位为 AI 增强研究、数据分析、工作流自动化与内容创作的横向生产力底座；Google AI Studio 上线直接在站内构建连接 Gmail / Drive / Sheets 等应用的能力，不再需要跳转外部网站；Anthropic 把面向关键基础设施的 Project Glasswing 从 50 家合作组织扩大到约 150 家，覆盖电力、水务、医疗、通信、硬件——任一被攻击都可能影响超 1 亿人——并推出基于 Claude Opus 4.8 等模型的 Claude Security 产品。智能体从\"模型能力\"到\"特定业务嵌入\"的路径越来越具体。", "meta": ["智能体", "业务嵌入"], "sources": [["S0083", "Google AI Studio 新增 Gmail 等应用构建能力", "https://x.com/OfficialLoganK/status/2061568290984800740"], ["S0088", "Codex正在成为每个人的生产力工具", "https://openai.com/index/codex-for-knowledge-work"], ["S0098", "Anthropic扩展Project Glasswing计划", "https://www.anthropic.com/news/expanding-project-glasswing"]]}, {"section": "ai", "title": "阶跃星辰 Step 3.7 Flash 发布，主打推理效率", "body": "阶跃星辰发布推理优化型模型 Step 3.7 Flash：196B MoE 架构，从设计之初专注推理效率；多矩阵分解注意力机制使 KV-cache 成本仅为 DeepSeek 模型约 22%；注意力与 FFN 解耦实现硬件优化高效服务；已通过 Fireworks AI 提供、Apache 2.0 许可、可用于构建智能体应用。国内推理优化方向继续推高小成本部署门槛。", "meta": ["国产模型", "推理效率"], "sources": [["S0090", "阶跃星辰Step 3.7 Flash发布，专为高效推理设计", "https://x.com/StepFun_ai/status/2061655529731342402"]]}, {"section": "ai", "title": "Alphabet 拟通过股权融资 800 亿美元用于 AI 资本支出（borderline）", "body": "彭博报道 Alphabet 计划通过发行股票筹集 800 亿美元，专门支持 AI 资本支出计划。即使在大型科技公司里这也是异常大额的融资动作，反映头部企业在算力 / 数据中心 / 模型研发上的支出曲线仍未见顶。", "meta": ["资本支出", "borderline"], "sources": [["S0081", "Alphabet将通过发行股票筹集800亿美元用于AI支出计划", "https://www.bloomberg.com/news/articles/2026-06-01/alphabet-to-raise-80-billion-in-equity-capital-for-ai-spending"]]}, {"section": "release", "title": "战双帕弥什《长路归航》新版本上线", "body": "库洛游戏自研的 3D 二次元动作 ARPG《战双帕弥什》（科幻 / 角色扮演 / 即时战斗）新版本\"长路归航\"上线。", "meta": ["库洛", "二次元 ARPG", "新版本"], "sources": [["S0104", "战双帕弥什 - 新版本", "https://newgame.17173.com/game-info-1037186.html"], ["S0112", "战双帕弥什 - 新版本「长路归航」开启", "https://www.3839.com/a/98964.htm"]]}, {"section": "release", "title": "二重螺旋《银星奔流》新版本上线", "body": "二次元动作 RPG《二重螺旋》新版本\"银星奔流\"上线。", "meta": ["二次元动作 RPG", "新版本"], "sources": [["S0110", "二重螺旋(官服) - 新版本「银星奔流」开启", "https://www.3839.com/a/158909.htm"], ["S0137", "二重螺旋 - 新版本更新", "https://www.taptap.cn/app/388717"]]}, {"section": "release", "title": "风之国世界 6/3 上线（6/2 18:00 预下载）", "body": "茉莉互娱的治愈系开放世界手游《风之国世界》（休闲放置 + 组队 MMO + 萌宠养成）6 月 2 日 18:00 开预下载、6 月 3 日正式上线。", "meta": ["茉莉互娱", "开放世界 MMO", "上线窗口"], "sources": [["S0117", "风之国世界-预下载 - 18:00 预下载，6月3日上线", "https://www.3839.com/a/191463.htm"], ["S0165", "风之国世界 - 预下载", "https://www.taptap.cn/app/796300"]]}, {"section": "release", "title": "夜幕之下 公测前瞻直播（borderline）", "body": "百奥游戏（广州天梯）旗下女性向新游《夜幕之下》（西西里黑手党题材、复仇剧情驱动）6 月 2 日 19:00 开启公测前瞻直播；公测 PV 在 B 站累计播放超 800 万、预约破 1000 万，是 6 月新游中最受关注的女性向产品之一。", "meta": ["百奥游戏", "女性向二游", "borderline"], "sources": [["S0118", "夜幕之下-全员恶人复仇题材(官服) - 19:00 开启公测前瞻直播", "https://www.3839.com/a/182365.htm"], ["S0022", "6月预计17款新游上线：女性向二游《夜幕之下》登场", "http://www.gamelook.com.cn/2026/06/594437/"]]}, {"section": "discourse", "title": "《燕云十六声》新地图 NPC 文案被指阴阳岳飞，运营连续三次反复修改", "body": "事件 5 月 30 日触发：网易《燕云十六声》新地图蓬山上线后，玩家发现部分 NPC 的姓名 / 文案中使用了\"忮忌\"\"忮贤忌能\"等典故。\"忮贤忌能\"在两宋史料中常用来形容赵构、秦桧一派对岳飞等贤能将领的猜忌打压；更直接的是 NPC 的名直接使用了岳飞的字\"鹏举\"。玩家因此判断是文案在以宋金为背景的世界观里含蓄站在金朝 / 赵构立场上阴阳民族英雄岳飞——社区直接以\"阴湿鹏举\"四字称呼该事件。\n\n此后项目组的修改路径反复横跳：第一次先把\"忮忌\"用词删掉但被指仍带阴阳味；6 月 2 日 19:16 又把整段 NPC 与文案改回最初版本，被社区解读为\"坚决跟玩家对抗到底\"；当日晚些时候 NGA 再次记录文案被第三次调整。玩家情绪从最初的愤怒滑向\"嘲讽 + 算账\"，并把它和此前燕云的\"飞白事件\"（同类型文案暗讽）做长期 pattern 联系。网易当日未给出说明性公告。", "meta": ["网易", "阴阳岳飞", "反复横跳"], "sources": [["S0181", "[新瓜]燕云新地图NPC文案使用\"忮忌\"，疑似阴阳民族英雄", "https://bbs.nga.cn/read.php?tid=46886352&forder_by=postdatedesc"], ["S0186", "[新瓜]神了，忮忌十六声，又把npc和文案改回最初版本", "https://bbs.nga.cn/read.php?tid=46909443&forder_by=postdatedesc"], ["S0191", "[新瓜]忮忌十六声最终选择修改忮忌文案，但依旧阴阳玩家", "https://bbs.nga.cn/read.php?tid=46894302&forder_by=postdatedesc"]]}, {"section": "discourse", "title": "《鸣潮》Warframe 联动余波 + 联动池珊瑚获取门槛被指变相涨价", "body": "Warframe 奥罗金阵营素材纠纷（5 月触发）在 6/2 仍有持续讨论：NGA 18 页延续帖中玩家科普并不接受\"在腾讯素材库里\"等洗白说法，认为是鸣潮过错在前、尽孝洗地不可取。叠加同期玩家发现联动池\"480 联动珊瑚才能换共鸣链\"且联动珊瑚获取量低于普通池，社区斥\"想表现优惠又不想让利太多——跟友商学到真东西了\"。两条诉求叠加，6/2 鸣潮社区情绪继续偏负面，官方当日未对珊瑚机制做回应。", "meta": ["库洛", "变现争议", "联动余波"], "sources": [["S0174", "warframe真有手游所以发瓜版 - 本次鸣潮wf被联动方奥罗金阵营科普", "https://bbs.nga.cn/read.php?tid=46766398"], ["S0187", "[新瓜]鸣潮联动池的联动限定珊瑚获取比普通池子少", "https://bbs.nga.cn/read.php?tid=46882140&_fp=2&forder_by=postdatedesc"]]}, {"section": "discourse", "title": "异环 国际服宣传图删去蟑螂，与国服版本不符（borderline）", "body": "NGA 帖（5/29 起持续到 6/2 晚仍活跃，11 页 207 回复）：玩家发现完美《异环》国际服宣传图在番茄场景中去除了国服宣传图里存在的蟑螂；官方 X 修改后又把国际服图换成\"国服同款带蟑螂的\"。社区借此调侃互联网梗\"自称蟑螂\"，引出对二游赛道地域 / 文化适配差异的轻量讨论。", "meta": ["完美", "地域差异", "borderline"], "sources": [["S0184", "[新瓜]异环国际服宣传图番茄后没有蟑螂 与国服不符", "https://bbs.nga.cn/read.php?tid=46877839&_fp=2&forder_by=postdatedesc"]]}, {"section": "discourse", "title": "金山软件 Q1 业绩公告未提《尘白禁区》（borderline）", "body": "金山软件 Q1 业绩公告：游戏及其他业务收益 8.04 亿元；雷军点名《鹅鸭杀》上线、《剑网3》维持稳定 + 4 月资料片；公告全文未提《尘白禁区》。NGA 玩家从业绩电话会议补充信息中抓出管理层\"将不具备战略发展的项目做调整\"的表述，结合《尘白禁区》近期停服两月重开后已不再宣发，推断该产品被实质性弱化、资源向《解限机》倾斜，社区一边讨论一边贴解限机最新赛季角色名单佐证。", "meta": ["西山居", "产品状态", "borderline"], "sources": [["S0190", "[厂商] 金山软件公布2026年第一季度业绩公告，尘白禁区只字未提", "https://bbs.nga.cn/read.php?tid=46868296&_fp=2&forder_by=postdatedesc"]]}, {"section": "deep", "title": "Embracer 把 Tomb Raider、Kingdom Come、Dead Island、Middle-earth 收拢成 Fellowship Entertainment", "body": "Embracer 过去几年的故事很狼狈：五年激进扩张后留下 20 亿美元债务，过去几年一直在做拆分、剥离、关闭与裁员。最新方案是把旗下 Warhorse（Kingdom Come）、Crystal Dynamics（Tomb Raider）、Dambuster（Dead Island）、Middle-earth Enterprises 等 IP 与工作室收拢到一家独立公开上市的 Fellowship Entertainment，由现 CEO Phil Rogers 领导。逻辑是\"用更小、更对齐——在游戏类型、技术栈、IP 主题上一致——的工作室组合\"取代原先的去中心化控股结构。这与 6/1 的 Scopely 形成有趣对位：Scopely 是\"高度集中的少数高价值移动资产\"，Embracer 是\"过度扩张后向中等聚焦回收\"，两者都在试图给\"控股发行集团\"问题给出不同回答，而 Fellowship 的成败将在某种程度上为西方 IP 资产的母公司治理模型再做一次现实测试。", "meta": ["母公司治理", "IP 资产组合"], "sources": [["S0198", "Embracer CEO: I hope trust in us is improving", "https://www.thegamebusiness.com/p/embracer-ceo-i-hope-trust-in-us-is"]]}, {"section": "deep", "title": "二游大厂过招：鸣潮 vs 原神的\"路线对立\"其实是生命周期错位（borderline）", "body": "GameLook 把当前社区中颇具戏剧性的\"鸣潮硬刚问题 vs 原神谈妥协\"叙事还原回上下文：原神开发者谈的是跨平台 + 长线运营框架下用手工调整商用扫描素材的工程化路径，鸣潮策划谈的是新版本\"拉海洛\"内容扩张后包体膨胀和性能压力的正面解决——两段表述本质是同一类工程问题在不同生命周期阶段下的不同表达。更值得关注的不是社区叙事本身，而是同期已有腾讯《王者荣耀世界》、完美《异环》、网易《代号：无限大》、诗悦《望月》等多个国产开放世界产品同框竞争。开放世界二游赛道正在从\"米哈游一极\"进入真正的\"百家争鸣\"阶段，而每家产品在不同生命周期点上释放的不同信号，会越来越容易被社区误读为路线之争。", "meta": ["二游赛道", "深度观察", "borderline"], "sources": [["S0023", "二游大厂过招了！《鸣潮》向左,《原神》向右？", "http://www.gamelook.com.cn/2026/06/594409/"]]}];
    const sectionLabels = Object.fromEntries(sections.map(s => [s.id, s.label]));
    const sectionDescs = Object.fromEntries(sections.map(s => [s.id, s.desc]));
    const orderedSectionIds = sections.filter(s => s.id !== "all").map(s => s.id);
    let currentSection = "all";
    let compact = false;
    const nav = document.getElementById("nav");
    const content = document.getElementById("content");
    const sectionHead = document.getElementById("sectionHead");
    const search = document.getElementById("search");
    const empty = document.getElementById("empty");
    const drawer = document.getElementById("drawer");
    const overlay = document.getElementById("overlay");
    function matches(item, query) {
      if (!query) return true;
      const text = [item.title,item.body,item.meta.join(" "),item.sources.map(s => s.join(" ")).join(" ")].join(" ").toLowerCase();
      return text.includes(query.toLowerCase());
    }
    function isBorderline(m) {
      return /borderline/i.test(m);
    }
    function renderNav() {
      nav.innerHTML = "";
      sections.forEach(section => {
        const count = section.id === "all" ? items.length : items.filter(item => item.section === section.id).length;
        const button = document.createElement("button");
        button.dataset.section = section.id;
        if (section.id === currentSection) button.classList.add("active");
        button.innerHTML = `<span>${section.label}</span><span class="count">${count}</span>`;
        button.addEventListener("click", () => { currentSection = section.id; render(); });
        nav.appendChild(button);
      });
    }
    function renderItem(item) {
      const node = document.createElement("article");
      node.className = "item";
      node.dataset.section = item.section;
      const metaTags = item.meta.map(m => {
        const cls = isBorderline(m) ? "borderline" : "";
        return `<span class="${cls}">${m}</span>`;
      }).join("");
      node.innerHTML = `<div class="item-top"><span class="tag">${sectionLabels[item.section]}</span></div><h3>${item.title}</h3><p>${item.body}</p><div class="meta-row">${metaTags}</div><button class="source-btn" type="button">查看来源 →</button>`;
      node.querySelector(".source-btn").addEventListener("click", () => openDrawer(item));
      return node;
    }
    function buildGrid(itemList) {
      const grid = document.createElement("section");
      grid.className = compact ? "grid compact" : "grid";
      itemList.forEach(item => grid.appendChild(renderItem(item)));
      return grid;
    }
    function buildSectionBlock(sectionId, itemList) {
      const block = document.createElement("div");
      block.className = "section-block";
      const banner = document.createElement("div");
      banner.className = "section-banner";
      banner.dataset.section = sectionId;
      banner.innerHTML = `<h2>${sectionLabels[sectionId]}</h2><span class="banner-count">${itemList.length} 条</span><span class="banner-desc">${sectionDescs[sectionId]}</span>`;
      block.appendChild(banner);
      block.appendChild(buildGrid(itemList));
      return block;
    }
    function render() {
      renderNav();
      const query = search.value.trim();
      const filtered = items.filter(item => (currentSection === "all" || item.section === currentSection) && matches(item, query));
      content.innerHTML = "";
      if (currentSection === "all") {
        sectionHead.style.display = "none";
        orderedSectionIds.forEach(sid => {
          const sectionItems = filtered.filter(it => it.section === sid);
          if (sectionItems.length > 0) content.appendChild(buildSectionBlock(sid, sectionItems));
        });
      } else {
        sectionHead.style.display = "flex";
        sectionHead.dataset.section = currentSection;
        document.getElementById("sectionTitle").textContent = sectionLabels[currentSection];
        document.getElementById("sectionDesc").textContent = sectionDescs[currentSection];
        content.appendChild(buildGrid(filtered));
      }
      empty.classList.toggle("visible", filtered.length === 0);
    }
    function openDrawer(item) {
      document.getElementById("drawerTitle").textContent = item.title;
      document.getElementById("drawerNote").textContent = item.body;
      document.getElementById("sourceList").innerHTML = item.sources.map(([id,name,url]) => {
        const safeUrl = String(url || "");
        const isHttp = /^https?:\/\//i.test(safeUrl);
        const linkAttrs = isHttp ? `href="${safeUrl}" target="_blank" rel="noopener noreferrer"` : "";
        const urlEl = isHttp
          ? `<a class="source-url" ${linkAttrs}>${safeUrl} ↗</a>`
          : `<span class="source-url">${safeUrl}</span>`;
        return `<div class="source-card"><strong>${id} · ${name}</strong>${urlEl}</div>`;
      }).join("");
      drawer.classList.add("open"); overlay.classList.add("open");
    }
    function closeDrawer() { drawer.classList.remove("open"); overlay.classList.remove("open"); }
    search.addEventListener("input", render);
    document.getElementById("printBtn").addEventListener("click", () => window.print());

    // Sidebar collapse — state persists in localStorage
    const app = document.getElementById("app");
    const SIDEBAR_KEY = "report-sidebar-collapsed";
    try { if (localStorage.getItem(SIDEBAR_KEY) === "1") app.classList.add("collapsed"); } catch (e) {}
    document.getElementById("sidebarToggle").addEventListener("click", () => {
      app.classList.toggle("collapsed");
      try { localStorage.setItem(SIDEBAR_KEY, app.classList.contains("collapsed") ? "1" : "0"); } catch (e) {}
    });
    document.getElementById("closeDrawer").addEventListener("click", closeDrawer);
    overlay.addEventListener("click", closeDrawer);
    document.getElementById("viewGrid").addEventListener("click", () => { compact = false; document.getElementById("viewGrid").classList.add("active"); document.getElementById("viewList").classList.remove("active"); render(); });
    document.getElementById("viewList").addEventListener("click", () => { compact = true; document.getElementById("viewList").classList.add("active"); document.getElementById("viewGrid").classList.remove("active"); render(); });
    render();
  </script>
</body>
</html>
