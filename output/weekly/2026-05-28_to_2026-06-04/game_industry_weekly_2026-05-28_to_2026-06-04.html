<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>游戏行业周报 | 2026-05-28 ~ 2026-06-04（steam周榜版）</title>
  <style>
    :root {
      --ink:#1a2436; --ink-soft:#3a4862; --muted:#6b7993; --faint:#9aa6bd;
      --accent:#5b6ef5;
      --glass:rgba(255,255,255,.62); --glass-strong:rgba(255,255,255,.78);
      --glass-border:rgba(255,255,255,.7); --line:rgba(31,45,75,.10); --line-strong:rgba(31,45,75,.16);
      --shadow-sm:0 3px 12px rgba(31,45,75,.05);
      --shadow:0 6px 28px rgba(31,45,75,.07);
      --shadow-lg:0 14px 40px rgba(31,45,75,.12);
      --industry:#4f7cff; --industry-soft:rgba(79,124,255,.12); --industry-ink:#2b53c4;
      --ai:#00b3d4; --ai-soft:rgba(0,179,212,.12); --ai-ink:#06748a;
      --release:#16b884; --release-soft:rgba(22,184,132,.13); --release-ink:#0b7a57;
      --rankings:#d05f3f; --rankings-soft:rgba(208,95,63,.13); --rankings-ink:#93402b;
      --discourse:#f0a02a; --discourse-soft:rgba(240,160,42,.15); --discourse-ink:#9a6206;
      --deep:#8b6df0; --deep-soft:rgba(139,109,240,.13); --deep-ink:#5a3fc0;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    html,body { height:100%; }
    body { color:var(--ink); font-family:"PingFang SC","Microsoft YaHei","Segoe UI",Arial,sans-serif; line-height:1.65; -webkit-font-smoothing:antialiased; }
    /* decorative gradient field behind the frosted glass */
    body::before { content:""; position:fixed; inset:0; z-index:-1;
      background:
        radial-gradient(circle at 12% 18%, rgba(91,110,245,.20), transparent 42%),
        radial-gradient(circle at 88% 12%, rgba(0,179,212,.16), transparent 40%),
        radial-gradient(circle at 78% 88%, rgba(139,109,240,.18), transparent 46%),
        radial-gradient(circle at 25% 92%, rgba(22,184,132,.13), transparent 44%),
        linear-gradient(135deg,#eef1fb 0%,#f3effb 48%,#eaf3fc 100%); }
    a { color:inherit; text-decoration:none; }
    button,input { font:inherit; }
    ::selection { background:rgba(91,110,245,.22); }
    .app { min-height:100vh; display:grid; grid-template-columns:264px minmax(0,1fr); transition:grid-template-columns .25s cubic-bezier(.4,0,.2,1); }
    .app.collapsed { grid-template-columns:0 minmax(0,1fr); }

    /* Sidebar — frosted glass */
    aside.sidebar { position:sticky; top:0; height:100vh; padding:24px 18px; color:var(--ink); display:flex; flex-direction:column;
      background:rgba(255,255,255,.48); backdrop-filter:blur(22px) saturate(170%); -webkit-backdrop-filter:blur(22px) saturate(170%);
      border-right:1px solid rgba(255,255,255,.55); overflow-y:auto; overflow-x:hidden; transition:transform .25s cubic-bezier(.4,0,.2,1), opacity .2s; }
    .app.collapsed aside.sidebar { transform:translateX(-100%); opacity:0; pointer-events:none; }

    /* Sidebar toggle button (in topbar, always visible) */
    .sidebar-toggle { width:40px; height:40px; border:1px solid var(--glass-border); background:var(--glass); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); color:var(--ink-soft); cursor:pointer; border-radius:12px; display:grid; place-items:center; font-size:16px; line-height:1; transition:all .14s; }
    .sidebar-toggle:hover { color:var(--accent); border-color:var(--accent); }
    .sidebar-toggle .icon-open { display:inline; }
    .sidebar-toggle .icon-close { display:none; }
    .app.collapsed .sidebar-toggle .icon-open { display:none; }
    .app.collapsed .sidebar-toggle .icon-close { display:inline; }
    .brand { display:flex; align-items:center; gap:12px; padding:0 2px 20px; border-bottom:1px solid var(--line); }
    .brand-mark { width:40px; height:40px; display:grid; place-items:center; border-radius:11px; background:#fff; padding:7px; box-shadow:0 3px 10px rgba(31,45,75,.10); }
    .brand-mark img { width:100%; height:100%; display:block; object-fit:contain; }
    .brand strong { display:block; font-size:15px; line-height:1.1; letter-spacing:.2px; color:var(--ink); }
    .brand span { display:block; font-size:11px; color:var(--muted); margin-top:3px; }
    .nav-title { margin:22px 0 10px; color:var(--faint); font-size:10px; letter-spacing:1.3px; text-transform:uppercase; font-weight:700; }
    .nav { display:grid; gap:3px; }
    .nav button { width:100%; display:flex; justify-content:space-between; align-items:center; gap:8px; border:0; background:transparent; color:var(--ink-soft); padding:11px 14px; text-align:left; cursor:pointer; border-radius:11px; position:relative; font-size:14px; font-weight:500; transition:all .14s; }
    .nav button:hover { background:rgba(255,255,255,.55); color:var(--ink); }
    .nav button.active { background:rgba(91,110,245,.12); color:var(--accent); font-weight:600; box-shadow:inset 0 0 0 1px rgba(91,110,245,.18); }
    .nav button.active::before { content:""; position:absolute; left:0; top:9px; bottom:9px; width:3px; border-radius:0 3px 3px 0; background:var(--accent2,var(--accent)); }
    .nav button[data-section="industry"] { --accent2:var(--industry); }
    .nav button[data-section="ai"] { --accent2:var(--ai); }
    .nav button[data-section="release"] { --accent2:var(--release); }
    .nav button[data-section="rankings"] { --accent2:var(--rankings); }
    .nav button[data-section="discourse"] { --accent2:var(--discourse); }
    .nav button[data-section="deep"] { --accent2:var(--deep); }
    .count { min-width:24px; padding:1px 9px; color:var(--muted); background:rgba(31,45,75,.07); text-align:center; border-radius:11px; font-size:12px; font-weight:600; }
    .nav button.active .count { background:var(--accent2,var(--accent)); color:#fff; }
    .sidebar-footer { margin:auto -18px -24px; padding:16px 22px; border-top:1px solid var(--line); font-size:11.5px; color:var(--muted); line-height:1.65; }
    .sidebar-footer .made { color:var(--ink-soft); font-weight:600; }
    .sidebar-footer a { color:var(--accent); }
    .sidebar-footer .stat { margin-top:8px; color:var(--faint); }

    /* Main */
    main { padding:30px 40px 64px; min-width:0; }
    .topbar { display:flex; align-items:flex-start; justify-content:space-between; gap:18px; margin-bottom:26px; padding-bottom:22px; border-bottom:1px solid var(--line); }
    h1 { margin:0; font-size:28px; line-height:1.25; letter-spacing:-.2px; font-weight:800; color:var(--ink); }
    .subtitle { margin-top:8px; color:var(--muted); font-size:13.5px; }
    .actions { display:flex; gap:10px; align-items:center; }
    .search { width:320px; display:flex; align-items:center; gap:8px; background:var(--glass); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border:1px solid var(--glass-border); padding:9px 14px; border-radius:12px; transition:border-color .15s, box-shadow .15s; }
    .search:focus-within { border-color:var(--accent); box-shadow:0 0 0 3px rgba(91,110,245,.12); background:#fff; }
    .search input { width:100%; border:0; outline:0; background:transparent; color:var(--ink); font-size:13.5px; }
    .search input::placeholder { color:var(--faint); }
    .icon-btn { border:1px solid var(--glass-border); background:var(--glass); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); color:var(--ink-soft); cursor:pointer; width:40px; height:40px; border-radius:12px; transition:all .14s; }
    .icon-btn:hover { color:var(--accent); border-color:var(--accent); }

    /* Metrics */
    .metrics { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:14px; margin-bottom:30px; }
    .metric { background:var(--glass); backdrop-filter:blur(16px) saturate(150%); -webkit-backdrop-filter:blur(16px) saturate(150%); border:1px solid var(--glass-border); padding:18px 20px; border-radius:18px; box-shadow:var(--shadow-sm); position:relative; overflow:hidden; }
    .metric::before { content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--accent2,var(--industry)); }
    .metric:nth-child(1) { --accent2:var(--industry); }
    .metric:nth-child(2) { --accent2:var(--release); }
    .metric:nth-child(3) { --accent2:var(--discourse); }
    .metric:nth-child(4) { --accent2:var(--deep); }
    .metric span { color:var(--muted); font-size:12.5px; letter-spacing:.3px; }
    .metric strong { display:block; font-size:26px; line-height:1.1; margin-top:6px; font-weight:800; color:var(--ink); }

    /* Section-head (单 section 视图) */
    .section-head { display:flex; justify-content:space-between; gap:16px; align-items:flex-end; margin:6px 0 20px; padding:16px 20px; background:var(--glass); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border:1px solid var(--glass-border); border-left:4px solid var(--accent2,var(--industry)); border-radius:18px; box-shadow:var(--shadow-sm); }
    .section-head[data-section="industry"] { --accent2:var(--industry); }
    .section-head[data-section="ai"] { --accent2:var(--ai); }
    .section-head[data-section="release"] { --accent2:var(--release); }
    .section-head[data-section="rankings"] { --accent2:var(--rankings); }
    .section-head[data-section="discourse"] { --accent2:var(--discourse); }
    .section-head[data-section="deep"] { --accent2:var(--deep); }
    h2 { margin:0; font-size:20px; font-weight:700; }
    .section-head p { margin:4px 0 0; color:var(--muted); font-size:13px; }
    .toggle { display:flex; border:1px solid var(--glass-border); background:var(--glass); border-radius:11px; overflow:hidden; }
    .toggle button { padding:8px 15px; border:0; background:transparent; color:var(--ink-soft); cursor:pointer; font-size:13px; transition:all .14s; }
    .toggle button.active { background:var(--accent); color:#fff; font-weight:600; }

    /* "全部" 视图下的 section 分块 */
    .section-block { margin-top:38px; }
    .section-block:first-child { margin-top:0; }
    .section-banner { display:flex; align-items:baseline; gap:14px; padding:13px 18px; margin-bottom:16px; background:var(--accent-soft,var(--industry-soft)); border-left:4px solid var(--accent2,var(--industry)); border-radius:14px; }
    .section-banner[data-section="industry"] { --accent2:var(--industry); --accent-soft:var(--industry-soft); --accent-ink:var(--industry-ink); }
    .section-banner[data-section="ai"] { --accent2:var(--ai); --accent-soft:var(--ai-soft); --accent-ink:var(--ai-ink); }
    .section-banner[data-section="release"] { --accent2:var(--release); --accent-soft:var(--release-soft); --accent-ink:var(--release-ink); }
    .section-banner[data-section="rankings"] { --accent2:var(--rankings); --accent-soft:var(--rankings-soft); --accent-ink:var(--rankings-ink); }
    .section-banner[data-section="discourse"] { --accent2:var(--discourse); --accent-soft:var(--discourse-soft); --accent-ink:var(--discourse-ink); }
    .section-banner[data-section="deep"] { --accent2:var(--deep); --accent-soft:var(--deep-soft); --accent-ink:var(--deep-ink); }
    .section-banner h2 { color:var(--accent-ink); font-size:17px; margin:0; font-weight:700; }
    .section-banner .banner-count { color:var(--accent2); font-weight:700; font-size:13px; }
    .section-banner .banner-desc { color:var(--accent-ink); opacity:.7; font-size:13px; margin-left:auto; }

    /* Cards — glass */
    .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px; }
    .grid.compact { grid-template-columns:1fr; }
    .item { background:var(--glass); backdrop-filter:blur(16px) saturate(150%); -webkit-backdrop-filter:blur(16px) saturate(150%); border:1px solid var(--glass-border); border-left:3px solid var(--accent2,var(--industry)); padding:20px 24px; border-radius:18px; box-shadow:var(--shadow-sm); transition:transform .18s, box-shadow .18s; display:flex; flex-direction:column; }
    .item:hover { box-shadow:var(--shadow-lg); transform:translateY(-2px); }
    .item[data-section="industry"] { --accent2:var(--industry); --accent-soft:var(--industry-soft); --accent-ink:var(--industry-ink); }
    .item[data-section="ai"] { --accent2:var(--ai); --accent-soft:var(--ai-soft); --accent-ink:var(--ai-ink); }
    .item[data-section="release"] { --accent2:var(--release); --accent-soft:var(--release-soft); --accent-ink:var(--release-ink); }
    .item[data-section="rankings"] { --accent2:var(--rankings); --accent-soft:var(--rankings-soft); --accent-ink:var(--rankings-ink); grid-column:1 / -1; }
    .item[data-section="discourse"] { --accent2:var(--discourse); --accent-soft:var(--discourse-soft); --accent-ink:var(--discourse-ink); }
    .item[data-section="deep"] { --accent2:var(--deep); --accent-soft:var(--deep-soft); --accent-ink:var(--deep-ink); }
    .item-top { display:flex; justify-content:space-between; gap:12px; align-items:center; margin-bottom:11px; }
    .tag { padding:3px 11px; font-size:12px; color:var(--accent-ink); background:var(--accent-soft); border-radius:8px; font-weight:700; letter-spacing:.2px; }
    h3 { margin:2px 0 10px; font-size:17.5px; line-height:1.45; font-weight:700; color:var(--ink); letter-spacing:.1px; }
    .item p { margin:0 0 14px; color:var(--ink-soft); font-size:14.5px; line-height:1.78; }
    .meta-row { display:flex; flex-wrap:wrap; gap:7px; color:var(--muted); font-size:12px; margin-bottom:4px; }
    .meta-row span { padding:3px 10px; background:rgba(31,45,75,.06); border-radius:8px; }
    .item .meta-row span.borderline { background:rgba(240,160,42,.14); color:#a8680a; }
    .source-btn { margin-top:14px; padding:8px 14px; border:1px solid var(--glass-border); background:rgba(255,255,255,.5); color:var(--accent); cursor:pointer; border-radius:11px; font-size:13px; font-weight:600; align-self:flex-start; transition:all .14s; }
    .source-btn:hover { background:var(--accent-soft); border-color:var(--accent2); }
    .ranking-notes { margin:0 0 12px; padding-left:20px; color:var(--ink-soft); line-height:1.55; font-size:13.5px; }
    .ranking-table-wrap { width:100%; overflow-x:auto; border:1px solid var(--line); border-radius:10px; background:rgba(255,255,255,.54); }
    .ranking-table { width:100%; min-width:680px; border-collapse:collapse; font-size:12.5px; }
    .ranking-table th,.ranking-table td { padding:6px 10px; border-bottom:1px solid var(--line); text-align:left; white-space:nowrap; }
    .ranking-table th { color:var(--ink); background:rgba(208,95,63,.08); font-weight:700; }
    .ranking-table td:first-child,.ranking-table th:first-child { text-align:right; }
    .ranking-table tbody tr:last-child td { border-bottom:0; }
    .empty { display:none; padding:48px; border:1px dashed var(--line-strong); color:var(--muted); text-align:center; background:var(--glass); border-radius:18px; }
    .empty.visible { display:block; }

    /* Drawer */
    .overlay { position:fixed; inset:0; display:none; background:rgba(26,36,54,.3); backdrop-filter:blur(3px); }
    .overlay.open { display:block; }
    .drawer { position:fixed; top:0; right:0; width:min(440px,100vw); height:100vh; transform:translateX(100%); transition:.22s cubic-bezier(.4,0,.2,1); background:rgba(255,255,255,.85); backdrop-filter:blur(24px) saturate(160%); -webkit-backdrop-filter:blur(24px) saturate(160%); border-left:1px solid var(--glass-border); box-shadow:-18px 0 44px rgba(31,45,75,.16); padding:24px; overflow:auto; }
    .drawer.open { transform:translateX(0); }
    .drawer-head { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; margin-bottom:8px; }
    .drawer h2 { font-size:17px; line-height:1.4; }
    #drawerNote { color:var(--muted); font-size:13px; line-height:1.7; margin:0 0 18px; padding-bottom:16px; border-bottom:1px solid var(--line); }
    .source-card { border:1px solid var(--glass-border); padding:13px 15px; margin-top:10px; border-radius:12px; background:rgba(255,255,255,.55); }
    .source-card strong { font-size:13px; color:var(--ink); }
    .source-url { display:block; margin-top:6px; color:var(--accent); overflow-wrap:anywhere; user-select:text; font-size:12.5px; text-decoration:none; }
    a.source-url:hover { text-decoration:underline; }
    a.source-url:focus-visible { outline:2px solid var(--accent); outline-offset:2px; border-radius:2px; }

    @media (max-width:900px) {
      .app { grid-template-columns:1fr; }
      aside.sidebar { position:relative; height:auto; }
      .nav { grid-template-columns:repeat(2,minmax(0,1fr)); }
      main { padding:22px 18px 36px; }
      .topbar,.section-head { align-items:stretch; flex-direction:column; }
      .search { width:100%; }
      .metrics,.grid { grid-template-columns:1fr; }
      .section-banner { flex-wrap:wrap; }
      .section-banner .banner-desc { margin-left:0; width:100%; }
    }
    @media print {
      body::before { display:none; }
      aside.sidebar,.actions,.toggle,.source-btn,.drawer,.overlay { display:none!important; }
      .app { display:block; }
      main { padding:0; }
      .item { break-inside:avoid; box-shadow:none; border-color:#bbb; backdrop-filter:none; background:#fff; }
      .section-banner { break-after:avoid; }
    }
  .rank-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:4px;}.rank-table th,.rank-table td{padding:7px 9px;border-bottom:1px solid var(--line);text-align:center;white-space:nowrap;}.rank-table th{color:var(--rankings-ink);background:var(--rankings-soft);font-weight:600;}.rank-table tbody tr:hover{background:rgba(208,95,63,.05);}.new-tag{display:inline-block;background:var(--rankings);color:#fff;padding:1px 7px;border-radius:7px;font-size:11px;}
  </style>
</head>
<body>
  <div class="app" id="app">
    <aside class="sidebar">
      <div class="brand" aria-label="沐瞳科技">
        <div class="brand-mark" aria-hidden="true"><img src="../../assets/moonton_logo.png" alt=""></div>
        <div><strong>游戏行业情报站</strong><span>AI 生成 · 每周更新</span></div>
      </div>
      <div class="nav-title">Sections</div>

    <main>
      <div class="topbar">
        <div><h1>游戏行业周报</h1><div class="subtitle">2026-05-28 ~ 2026-06-04 · steam周榜、行业新闻、AI、产品日历、玩家舆论与精选观察</div></div>
        <div class="actions">
          <button class="sidebar-toggle" id="sidebarToggle" type="button" title="折叠 / 展开侧栏" aria-label="切换侧栏">

    <div id="sourceList"></div>

    const items = [{"section": "rankings", "title": "Steam 官方周销量榜 TOP15（周 of 2026-05-26）", "body": "Steam 官方周销量榜 TOP15，本周 5 个新上榜：Forza Horizon 6、Paralives、Subnautica 2、LEGO Batman、Gamble With Your Friends；007 First Light 登顶第 1。数据来源 Steam 官方周榜 + Gamalytic 估算。", "body_html": "<p style=\"color:var(--muted);font-size:13px;margin-bottom:10px;\">数据来源：Steam 官方周销量榜（周二重置）+ Gamalytic 销量/营收估算；本周可取的最近完整周为「周 of 2026-05-26」，与报告窗口重叠。<code>★ 新上榜</code> 指相对上周新进入 TOP15。</p><ul style=\"margin:0 0 14px 18px;display:grid;gap:7px;\"><li><strong>《极限竞速：地平线6》(Forza Horizon 6)</strong>由 Xbox Game Studios 发行，5月19日上线后冲上周榜第2、新上榜；销量约263.8万、好评率84%，是本周非免费榜里最强的新势力。</li><li><strong>《Paralives》</strong>由 Paralives Studio 发行，5月25日抢先体验开卖即空降第4、新上榜；销量约66.7万、好评率91%，这款被视作《模拟人生》竞品的生活模拟新作印证了生活模拟在 PC 端的付费潜力。</li><li><strong>《Subnautica 2》</strong>(Unknown Worlds) 5月14日抢先体验上线，本周第6、新上榜，销量约432.5万、好评率91%，海洋生存探索续作开局体量可观。</li><li><strong>《LEGO Batman: Legacy of the Dark Knight》</strong>(Warner Bros) 5月22日上线、本周第7、新上榜，好评率高达96%。</li><li><strong>《007 First Light》</strong>(IO Interactive) 5月27日上线即登顶周榜第1，销量约82.3万、好评率92%，是本周最受关注的叙事动作单机。</li></ul><div style=\"overflow-x:auto;\"><table class=\"rank-table\"><thead><tr><th>Rank</th><th>标记</th><th style=\"text-align:left\">Name</th><th>价格</th><th>好评率</th><th>上线</th><th style=\"text-align:right\">销量</th><th style=\"text-align:right\">营收</th></tr></thead><tbody><tr><td>1</td><td></td><td style='text-align:left'>007 First Light</td><td>$69.99</td><td>92%</td><td>2026-05-27</td><td style='text-align:right'>82.3万</td><td style='text-align:right'>$4780.0万</td></tr><tr><td>2</td><td><span class=\"new-tag\">★ 新上榜</span></td><td style='text-align:left'>Forza Horizon 6</td><td>$69.99</td><td>84%</td><td>2026-05-19</td><td style='text-align:right'>263.8万</td><td style='text-align:right'>$1.57亿</td></tr><tr><td>3</td><td></td><td style='text-align:left'>Counter-Strike 2</td><td>免费</td><td>86%</td><td>2012-08-21</td><td style='text-align:right'>3.49亿</td><td style='text-align:right'>$119.8 </td><td>免费</td><td>30%</td><td>2023-08-10</td><td style='text-align:right'>1741万</td><td style='text-align:right'>$1.19亿</td></tr><tr><td>14</td><td><span class=\"new-tag\">★ 新上榜</span></td><td style='text-align:left'>Gamble With Your Friends</td><td>$7.99</td><td>89%</td><td>2026-05-01</td><td style='text-align:right'>209.5万</td><td style='text-align:right'>$1260.0万</td></tr><tr><td>15</td><td></td><td style='text-align:left'>Dead by Daylight</td><td>$19.99</td><td>79%</td><td>2016-06-14</td><td style='text-align:right'>1900.2万</td><td style='text-align:right'>$1.82亿</td></tr></tbody></table></div>", "meta": ["Steam 周榜", "TOP15", "5 新上榜"], "sources": [["steamdb_rankings_periodic_2026-05-28_to_2026-06-04", "Steam 官方周销量榜 TOP15（周 of 2026-05-26）", "https://store.steampowered.com/charts/topselling/global"]]}, {"section": "industry", "title": "腾讯SPARK2026发布会：42款游戏亮相，两项游戏AI技术压轴落地", "body": "5月27日腾讯举办SPARK2026发布会，制作、发行、投资三篇章共公布42款海内外游戏动态。压轴的“One More Thing”发布两项游戏AI产品：全球首个跨平台神经动态全局光照方案NDGI（全面开源）与AI游戏创作平台“代号Craft”，并首曝瓷业经营小游戏《瓷都小匠》。AI还落地多款产品，《和平精英》推出AI明星队友“小田”及15分钟出demo的UGC创作助手，《王者荣耀》上线AI解说。", "meta": ["腾讯", "SPARK2026", "游戏AI"], "sources": [["S0001", "GameLook · SPARK2026腾讯游戏发布会：超40款游戏公布最新动态", "http://www.gamelook.com.cn/2026/05/594077/"], ["S0085", "机核 · SPARK2026腾讯游戏发布会消息汇总", "https://www.gcores.com/articles/215049"], ["S0035", "yystv · 42款游戏集中亮相，今年的腾讯游戏发布会", "https://www.yystv.net/"], ["S0018", "游戏陀螺 · 有大作有独游还有很多AI：腾讯的“牌”还是太多了", "https://www.youxituoluo.com/534525.html"]]}, {"section": "industry", "title": "微信小游戏MAU破5亿，PC端成为新增量窗口", "body": "2026微信小游戏大会披露：月活用户达5亿（24–40岁占半数、日均超60分钟、好友互动日均破1亿次），开发者超50万、八成团队少于30人，DAU破百万小游戏从60款增至80款、单季流水破千万超300款，且已跑通iOS支付。PC端信号突出：40%为PC独占用户、付费用户ARPU同比增130%、在线时长增100%，平台为此额外让出10%专属广告金。", "meta": ["微信小游戏", "5亿MAU", "PC增量"], "sources": [["S0006", "GameLook · 微信李卿：小游戏月活用户破5亿", "http://www.gamelook.com.cn/2026/05/594104/"], ["S0003", "GameLook · 微信孟令刚：PC小游戏付费用户ARPU增长130%", "http://www.gamelook.com.cn/2026/05/594154/"], ["S0004", "GameLook · 微信翁裕淦：IAA小游戏MAU 4亿、70%玩家只玩IAA", "http://www.gamelook.com.cn/2026/05/594155/"], ["S0044", "腾讯新闻 · 微信小游戏：超300款单季度流水破千万", "https://new.qq.com/rain/a/20260528A05ZW300"]]}, {"section": "industry", "title": "腾讯股价单日暴涨10.09%，催化剂为微信AI智能体原型测试完成", "body": "6月2日腾讯港股收480港元，单日涨10.09%、市值超4.38万亿港元，创2021年1月以来最大单日涨幅，美团、阿里同日大涨。主要催化剂为《金融时报》报道：腾讯已完成微信内嵌AI智能体的原型测试，最快6月启动公开上线前的合规审批，并将其列为公司最高战略优先级，前OpenAI研究员姚顺雨主导该项目。", "meta": ["腾讯", "股价+10%", "微信AI"], "sources": [["S0866", "GameLook · 微信要放出“终极猛兽”？腾讯股价史诗级暴涨10%", "http://www.gamelook.com.cn/2026/06/594601/"]]}, {"section": "industry", "title": "Fortnite全球iOS回归首周340万下载，创八年新高", "body": "据AppMagic数据，Fortnite重返iOS的首个7天约获340万次下载，接近2018年上线首周的370万，是其登陆App Store以来第四强的一周。分地区看沙特以47.4万次领跑，法国36.6万、英国30.7万，美国仅15.1万；5月23日单日峰值达67.4万次。澳大利亚仍因支付争议未恢复上架。", "meta": ["Epic", "Fortnite", "iOS回归"], "sources": [["S0051", "GamesIndustry · Fortnite's global iOS return reaches 3.4m downloads", "https://www.gamesindustry.biz/fortnites-global-ios-return-reportedly-reaches-34m-downloads-marking-an-eight-year-high"]]}, {"section": "industry", "title": "《王者荣耀：世界》执行制作人李新平公测一月后离职", "body": "6月2日消息，腾讯天美《王者荣耀：世界》执行制作人兼主美李新平已正式离职，距该作4月公测仅约一个月。他自2019年主导这款研发七年的IP拓展作。游戏上线后最高仅至iOS畅销榜第24、最低跌至154名，4月底他已被调任顾问、由天美L1总经理李旻兼任制作人。游戏5月29日开启S1赛季短暂回升至第16位，但未改变其离职结局。", "meta": ["腾讯天美", "李新平", "制作人离职"], "sources": [["S0661", "游戏陀螺 · 《王者荣耀：世界》执行制作人李新平离职", "https://www.youxituoluo.com/534540.html"], ["S0670", "腾讯新闻 · 《王者荣耀：世界》制作人李新平离职，天美L1负责人接手", "https://new.qq.com/rain/a/20260602A04YKY00"], ["S0210", "次世代游戏 · 《王者荣耀世界》团队变了，今天迎来第一波大考", "https://cgames.com/contents/2/11659.html"]]}, {"section": "industry", "title": "网易《破碎之地》制作人吴晓创业，新作《逃离动物城》主打俯视角PVE搜打撤", "body": "网易《破碎之地》（中式废土PVE射击、耗资数亿未上线）制作人吴晓离职后成立广州北落师门工作室，6月2日首曝新作《逃离动物城》。该作为俯视角PVE搜打撤，以僵尸末日为背景、扮演幸存小动物搜刮物资，支持3人组队并主打场景破坏，计划2026年Q3测试、采用抽卡变现。吴晓认为当下新品立项要么3A化要么轻量化，并判断PVE在射击品类国际占比约20%、国内远未达到。", "meta": ["网易系", "搜打撤", "制作人创业"], "sources": [["S0676", "腾讯新闻 · 网易《破碎之地》制作人创业，带着搜打撤新游杀回来了！", "https://new.qq.com/rain/a/20260602A04YKU00"], ["S0757", "好游快报 · 逃离动物城-动物搜打撤 首曝，预计Q3开测", "https://www.3839.com/a/198596.htm"]]}, {"section": "industry", "title": "腾讯《三角洲行动》招聘曝光UGC平台计划", "body": "据PocketGamer援引Game Daily，腾讯IEG一则更新招聘透露《三角洲行动》正筹备UGC平台，规划包含创作者工具、游戏内编辑器、内容分发与变现机制，目标支撑百万级DAU的创作者生态。《三角洲行动》国内DAU已于2026年3月突破5000万。该消息目前仍属招聘信息层面，但方向明确，指向将这款大DAU搜打撤产品向长线内容平台演进。", "meta": ["腾讯", "三角洲行动", "UGC平台"], "sources": [["S0471", "PocketGamer · Tencent reportedly preparing UGC initiative for Delta Force", "https://www.pocketgamer.biz/tencent-reportedly-preparing-ugc-initiative-for-delta-force/"]]}, {"section": "industry", "title": "灵犀《宗师之上》上线即爆，首次试水放置MMO品类", "body": "灵犀互娱新品《宗师之上》iOS畅销榜最高冲至TOP10、半月流水近亿、月流水有望破亿。该作为修仙竖版放置MMO，采用3D卡通渲染轻国风，以“二合+开箱like”改造放置玩法、技能可自由BD无职业限制，公测联动《浪浪山小妖怪》。其商业化将境界修为做成不可付费加速、把氪金深度藏进同境“头衔”压制并主打高性价比小额礼包。这是以《三国志·战略版》和女性向《如鸢》著称的灵犀首次尝试放置MMO。", "meta": ["灵犀互娱", "放置MMO", "国产爆款"], "sources": [["S0438", "GameLook · “灵犀的修仙游戏搞大了”？冲进畅销榜TOP10", "http://www.gamelook.com.cn/2026/06/594332/"], ["S1070", "次世代游戏 · 15天流水近亿，灵犀新游火了", "https://cgames.com/contents/2/11755.html"]]}, {"section": "industry", "title": "巨人《超自然行动组》出海日韩，日免费榜第3、韩第7", "body": "5月27日巨人网络《超自然行动组》海外版《Tomb Busters》登陆美日韩，三端互通，首日冲上日本App Store免费榜第3、韩国第7，韩国预约已破百万。该作以“中式微恐+搜打撤”玩法在国内DAU破千万，截至2026年Q1累计注册超2亿、累计流水破50亿。巨人网络2026年Q1营收23.29亿元、同比增221.7%，归母净利同比增210.58%。", "meta": ["巨人网络", "出海日韩", "搜打撤"], "sources": [["S0202", "GameLook · 巨人动了！《超自然行动组》出海，日本免费榜第3、韩国第7", "http://www.gamelook.com.cn/2026/05/594321/"]]}, {"section": "industry", "title": "网易2026年Q1游戏收入同比增6.9%至约37亿美元", "body": "网易发布2026年第一季度财报，游戏业务收入257亿元人民币（约37亿美元）、同比增6.9%，整体营收同比增6.1%至306亿元，其中97.5%来自在线游戏运营。《梦幻西游》《第五人格》《蛋仔派对》《永劫无间》为国内主力，《燕云十六声》与《漫威争锋》扩大海外发行。财报同时显示，网易3月已停止资助名越工作室。", "meta": ["网易", "Q1财报", "+6.9%"], "sources": [["S0231", "GamesIndustry · NetEase reports 6.9% increase in games revenue to $3.7bn", "https://www.gamesindustry.biz/netease-reports-69-increase-in-games-revenue-to-37bn-during-q1"]]}, {"section": "industry", "title": "Block Blast（3亿MAU）突遭谷歌Play下架，同日恢复", "body": "5月28日，月活3亿、累计装机约8.68亿的消除手游《Block Blast》突然从Google Play下架，波及全球177个地区，数小时内恢复，官方未说明原因，iOS与国内安卓渠道不受影响。开发商Hungry Studio位列2025年全球Top50手游厂商第42。一款日活7000万级产品在头部安卓渠道的短暂下架，体量之大令此次渠道摩擦格外受业界关注。", "meta": ["Block Blast", "3亿MAU", "渠道下架"], "sources": [["S0234", "PocketGamer · Block Blast no longer available on Google Play", "https://www.pocketgamer.biz/hungry-studios-block-blast-no-longer-available-on-google-play/"], ["S0239", "PocketGamer · Block Blast returns to Google Play", "https://www.pocketgamer.biz/hungry-studios-block-blast-returns-to-google-play/"]]}, {"section": "industry", "title": "Atari以最高3930万美元收购《Crossy Road》开发商Hipster Whale", "body": "Atari宣布收购澳洲休闲游戏商Hipster Whale，初始对价2930万美元（含330万股票），三年对赌最高再加1000万，合计最高3930万美元。该公司上一财年营收828万美元，代表作《Crossy Road》累计下载超3.4亿。联合创始人Matt Hall将领导Atari移动开发，涉及Netflix、Amazon及车载平台等项目。", "meta": ["Atari", "并购", "移动休闲"], "sources": [["S0479", "MobileGamer · Atari acquires Crossy Road maker Hipster Whale for $29.3m", "https://mobilegamer.biz/atari-acquires-crossy-road-maker-hipster-whale-for-an-initial-29-3m/"], ["S0481", "PocketGamer · Atari acquires Crossy Road creator Hipster Whale", "https://www.pocketgamer.biz/atari-acquires-crossy-road-creator-hipster-whale-in-deal-worth-up-to-393m/"], ["S0505", "Game Developer · Atari to acquire Crossy Road developer Hipster Whale", "https://www.gamedeveloper.com/business/atari-to-acquire-crossy-road-developer-hipster-whale"]]}, {"section": "industry", "title": "ESA 2026年报：美国2025年游戏消费607亿美元，移动为最大平台", "body": "美国娱乐软件协会（ESA）联合Circana发布2026年报：2025年美国游戏总消费607亿美元（内容523亿、硬件54亿、配件29.5亿），超过电影、电视和音乐三者合计。超2.12亿美国人玩游戏，平均年龄37岁。移动是最受欢迎平台，覆盖73%家庭和80%的8岁以上玩家，近三分之一玩家只用移动；PC占52%、主机44%。", "meta": ["ESA", "美国市场", "607亿"], "sources": [["S0884", "GamesIndustry · ESA: 67% of Americans played video games in 2025", "https://www.gamesindustry.biz/esa-67-of-americans-played-video-games-for-more-than-an-hour-in-2025"], ["S0899", "Game Developer · Total consumer spending on games topped $60B in the US", "https://www.gamedeveloper.com/business/total-consumer-spending-on-games-topped-60b-in-the-us-in-2025"]]}, {"section": "industry", "title": "Niko Partners：亚洲及MENA游戏市场2030年预计达1036亿美元", "body": "Niko Partners 模型显示：2025年亚洲及MENA收入888亿美元，2030年预计达1036亿美元，玩家近20亿。中日韩占89%，但增长引擎在外围——印度以11%复合增速领跑、玩家超5亿、2027年移动付费将破10亿美元；MENA三国2030年达30亿美元；东南亚泰国2026年破20亿、印尼2030年达15亿。中国小游戏已占移动支出近20%，女性玩家占比升至42%。", "meta": ["Niko Partners", "亚洲+MENA", "市场预测"], "sources": [["S0893", "PocketGamer · Asia and MENA video game revenue set to surpass $100bn by 2030", "https://www.pocketgamer.biz/report-asia-and-mena-video-game-revenue-set-to-surpass-100bn-by-2030/"]]}, {"section": "industry", "title": "抖音游戏白皮书：65.3%流水增量来自上线超一年的成熟产品", "body": "巨量引擎联合伽马数据发布《游戏行业特色人群白皮书》：2025年流水增量TOP100的移动游戏中，65.3%来自上线超一年的成熟产品，占比高于新品，老游“逆生长”成为行业增长主要支撑。报告指出近六成头部手游明星达人合作数在两人以上，超六成下载新游或回流的用户受平台因素影响。其据此提出按“竞技制霸发烧友”等九类特色人群做定向投放的方法论。", "meta": ["抖音", "老游长线", "特色人群"], "sources": [["S0666", "游戏茶馆 · 抖音「游戏特色人群」白皮书：6成流水来自老游", "https://youxichaguan.com/archives/197630"]]}, {"section": "industry", "title": "欧洲移动游戏2025年全球营收75.3亿欧元（King委托报告）", "body": "Candy Crush发行商King委托Nordicity的报告显示：欧洲移动游戏公司2025年全球创收75.3亿欧元，预计2028年突破80亿，对欧洲经济贡献增加值58.9亿欧元，覆盖32国超1000家移动工作室、支撑6.33万个全职岗位。芬兰、英国、爱尔兰为收入前三。报告同时指出移动已占全球游戏收入55%，欧洲发行商将41%年支出投入买量与留存。", "meta": ["King", "欧洲移动", "75.3亿欧元"], "sources": [["S0677", "GamesIndustry · European mobile games sector generates €7.53bn globally", "https://www.gamesindustry.biz/european-mobile-games-sector-generates-753bn-globally-in-2025"], ["S0478", "PocketGamer · King’s first European market report", "https://www.pocketgamer.biz/kings-first-european-market-report/"]]}, {"section": "industry", "title": "神魔之塔宣传片实锤抄袭《鸣潮》，Madhead道歉", "body": "香港老牌手游《神魔之塔》新角色“成吉思汗”宣传片被指分镜、运镜、特效与动作与《鸣潮》“绯雪”共鸣解放高度雷同，地面倒影直接映出绯雪原模型。5月27日开发商Madhead正式道歉、承认制作与审核严重失职、启动问责、视频下架，整改含“重新检视AI辅助制作流程、禁止以第三方作品直接生成或重制素材”。该事件也折射出AI辅助制作的合规边界问题。", "meta": ["Madhead", "神魔之塔", "抄袭道歉 · borderline"], "sources": [["S0203", "GameLook · “《鸣潮》优秀到被人抄了”？《神魔之塔》道歉、启动内部问责", "http://www.gamelook.com.cn/2026/05/594281/"]]}, {"section": "industry", "title": "金山Q1游戏收入下滑22%，西山居推进“关停并转”", "body": "金山软件Q1营收24.17亿元（+3%），但游戏及其他业务收入8.03亿元、同比下滑22%、环比降7%，占比从约四成降至33%，主因现有游戏收益下降。CEO邹涛称下滑趋势还会延续一到两个季度，重点版本要到Q3/Q4。《鹅鸭杀》处用户增长阶段，4月《甄嬛传》联动曾冲畅销榜第5。西山居推进“关停并转”、夯实《剑网3》剑侠系列并探索AI创作新范式。", "meta": ["金山西山居", "游戏-22%", "关停并转 · borderline"], "sources": [["S0204", "GameLook · 金山Q1游戏收入下滑22%，CEO邹涛摊牌", "http://www.gamelook.com.cn/2026/05/594299/"]]}, {"section": "ai", "title": "腾讯MagicDawn NDGI：全球首个跨平台神经动态全局光照，全面开源", "body": "SPARK2026发布的MagicDawn NDGI以神经网络实时推理替代传统全局光照的预计算存储，画质比肩路径追踪、性能消耗远低于Lumen等传统方案，已落地量产腾讯游戏产品并向全行业完全开源。该方案还联合Arm深度适配2026新一代Arm GPU内置的AI加速器，面向移动端AI渲染。对开发者而言，高质量动态光照的获取门槛被显著拉低。", "meta": ["腾讯", "NDGI", "渲染开源"], "sources": [["S0028", "游戏茶馆 · AI重构游戏光影：腾讯发布全球首个跨平台神经动态GI方案", "https://youxichaguan.com/archives/197227"], ["S0001", "GameLook · SPARK2026腾讯游戏发布会", "http://www.gamelook.com.cn/2026/05/594077/"]]}, {"section": "ai", "title": "腾讯“代号Craft”：自然语言输入即可生成可玩游戏", "body": "腾讯生态发展部自研的AI游戏创作平台“代号Craft”在SPARK2026亮相。用户仅需输入自然语言文字指令，AI便能搭建2D与3D多品类游戏雏形；平台内置完整AIGC工具链，免费开放超万种预制美术资产以解决中小创作者的美术产能痛点，近期将开启官方首测。它代表AI正从辅助工具走向直接降低游戏内容生产门槛的环节。", "meta": ["腾讯", "代号Craft", "AIGC"], "sources": [["S0020", "游戏茶馆 · AI游戏创作平台“代号Craft”亮相腾讯游戏发布会", "https://youxichaguan.com/archives/197114"], ["S0001", "GameLook · SPARK2026腾讯游戏发布会", "http://www.gamelook.com.cn/2026/05/594077/"]]}, {"section": "ai", "title": "GDC 2026趋势报告：生成式AI采用上升，但落地标准仍有分歧", "body": "GDC 2026趋势报告归纳五大趋势：生成式AI普及、联合研发增长、手游双重变现（IAA+IAP）普及、融资与发行更难、反DEI与年龄歧视。报告称在规划、头脑风暴、邮件等场景AI已获普遍支持（资深从业者更高，Claude Code被频繁提及），但代码与美术资产侧更谨慎。对AI能自动化多少任务业界分歧巨大——暴雪一位高管称约70%，另一工作室CEO称“远不到10%”。", "meta": ["GDC 2026", "生成式AI", "趋势报告"], "sources": [["S1059", "GameLook · GDC 2026游戏业趋势报告：生成式AI、合作研发、与手游混合变现", "http://www.gamelook.com.cn/2026/06/594666/"]]}, {"section": "ai", "title": "微信内嵌AI智能体完成原型测试，剑指小程序生态互通", "body": "据《金融时报》，腾讯已完成微信内嵌AI智能体的原型测试，用户可在主界面右滑进入对话框，由智能体自动调用小程序执行指令（如查找咖啡馆并下单）。其最大价值在于打通微信数百万小程序乃至小游戏的互通，为5亿小游戏用户的分发链路新增一个有意图的AI入口层。项目由前OpenAI研究员姚顺雨主导，并参照了腾讯参股的Kakao AI Agent的落地经验。", "meta": ["微信", "AI智能体", "分发入口"], "sources": [["S0866", "GameLook · 微信要放出“终极猛兽”？腾讯股价史诗级暴涨10%", "http://www.gamelook.com.cn/2026/06/594601/"]]}, {"section": "release", "title": "崩坏：星穹铁道", "body": "《崩坏：星穹铁道》由米哈游开发，官服4.3版本于6月1日更新，全新五星角色【千冶·刃】登场；作为头部二次元RPG的核心版本节点，受到赛季关注。", "meta": ["二次元RPG", "米哈游", "4.3版本"], "sources": [["S0547", "好游快报 · 崩坏：星穹铁道(官服)-4.3版本 新角色【千冶•刃】登场", "https://www.3839.com/a/138206.htm"], ["S0545", "17173 · 崩坏：星穹铁道 - 新版本", "https://newgame.17173.com/"]]}, {"section": "release", "title": "鸣潮", "body": "《鸣潮》由库洛科技开发，3.4版本“未曾梦见之梦”定于6月8日上线；品类为开放世界动作RPG，是二游头部梯队作品，本次更新正处于其2077联动卡池争议的窗口期内。", "meta": ["开放世界RPG", "库洛", "3.4版本"], "sources": [["S0285", "Gematsu · Wuthering Waves version 3.4 ‘The Dream Not Dreamed’ launches June 8", "https://www.gematsu.com/"]]}, {"section": "release", "title": "宝可梦 Champions", "body": "《宝可梦 Champions》由宝可梦公司发行，移动版定于6月17日起在iOS与安卓陆续上线；品类为收集对战RPG，是全球最大游戏IP的独立移动端对战产品，多源确认发布日期。", "meta": ["收集对战", "宝可梦公司", "6.17上线"], "sources": [["S1004", "Gematsu · Pokemon Champions for iOS, Android launches June 17", "https://www.gematsu.com/"], ["S1095", "PocketGamer · Pokémon Champions’ mobile release slated for June 17th", "https://www.pocketgamer.biz/pokemon-champions-mobile-release-slated-for-june-17th/"]]}, {"section": "release", "title": "夜幕之下", "body": "《夜幕之下》由广州百奥旗下不眠夜工作室开发，6月5日开启公测；品类为女性向家族群像角色扮演，主打家族帮派复仇题材与即时制卡牌战斗，全平台预约破千万、预下载登顶iOS下载总榜，是女性向赛道一次较锋利的品类探索。", "meta": ["女性向群像", "百奥/不眠夜", "6.5公测"], "sources": [["S0760", "好游快报 · 夜幕之下-全员恶人复仇题材(官服) 公测前瞻直播", "https://www.3839.com/a/182365.htm"], ["S0882", "腾讯新闻 · 下载总榜第一！对话《夜幕之下》团队", "https://new.qq.com/rain/a/20260603A073M400"]]}, {"section": "release", "title": "料理人班乔", "body": "《料理人班乔》由《潜水员戴夫》原班工作室MINTROCKET开发，在索尼State of Play首曝、Steam与PS5商店页已上线；品类为烹饪模拟冒险，玩家扮演班乔环游亚洲城市精进厨艺，是该生活模拟IP的新衍生作。", "meta": ["烹饪模拟", "MINTROCKET", "戴夫IP"], "sources": [["S0875", "游戏茶馆 · MINTROCKET烹饪冒险新作《料理人班乔》首曝", "https://youxichaguan.com/archives/197674"], ["S1065", "GameLook · 《潜水员戴夫》前传发布，人气角色班乔踏上厨神之旅", "http://www.gamelook.com.cn/2026/06/594685/"]]}, {"section": "release", "title": "影之刃零", "body": "《影之刃零》由灵游坊开发，宣布从原定9月9日延期50天至2026年10月29日；品类为武侠朋克动作，制作人梁其伟致歉并称延期是为升级角色模型与重构场景、争取在不依赖光追下保留表现力。", "meta": ["武侠朋克动作", "灵游坊", "延期10.29"], "sources": [["S0874", "游戏茶馆 · 梁其伟：《影之刃零》延期50天只为交出最好答卷", "https://youxichaguan.com/archives/197660"], ["S0767", "Gematsu · Phantom Blade Zero delayed to October 29", "https://www.gematsu.com/"]]}, {"section": "discourse", "title": "《鸣潮》2077联动卡池被爆独立保底+副产物缩水，玩家质疑变相涨价", "body": "《鸣潮》Cyberpunk 2077联动卡池规则前瞻被NGA玩家爆料后引发大规模质疑，主帖在本地窗口内从407条回复涨至428条、综合热度近1001，为窗口内最热议话题之一。玩家不满的核心在于：联动池采用独立保底、独立抽卡道具和独立副产物，与普通池保底不互继承；联动专属副产物“幻梦珊瑚”的获取量相比普通珊瑚被全面削减；且需攒满480颗珊瑚才解锁共鸣链兑换功能（兑换价仍为360）。玩家称这是“在七折优惠幌子下变相涨价、加门槛、砍获取”，直接评价为“纯纯恶心人的设计”，并对比《终末地》、质疑库洛进入腾讯后的KPI压力。截至本地窗口，库洛官方未发布正式回应，而3.4版本将于6月8日在这一争议窗口内上线。", "meta": ["鸣潮", "2077联动", "变现争议"], "sources": [["S0289", "NGA · [新瓜]鸣潮2077联动卡池规则前瞻爆出，节奏开始了", "https://bbs.nga.cn/read.php?tid=46882152"], ["S0296", "NGA · [新瓜]鸣潮联动池的联动限定珊瑚获取比普通池子少", "https://bbs.nga.cn/read.php?tid=46882140"], ["S0829", "NGA · 鸣潮联动池珊瑚获取（续）", "https://bbs.nga.cn/read.php?tid=46882140&_fp=2"], ["S1009", "NGA · 鸣潮2077联动卡池（续）", "https://bbs.nga.cn/read.php?tid=46882152&_fp=2"]]}, {"section": "discourse", "title": "《燕云十六声》新地图NPC“付鹏举”“忮忌”被指阴阳岳飞，三轮改动仍未平息", "body": "《燕云十六声》5月30日上线新地图“蓬山”后，玩家发现一名NPC名为“付鹏举”、文案使用“忮忌”一词，在NGA引发208条回复（热度583）的大帖。影射解读依据有三：其一，影射对象是岳飞，其字“鹏举”，“付鹏举”被读作谐音“副鹏举”；其二，“忮忌”取自成语“忮贤忌能”，在两宋史料中常用于形容赵构、秦桧一派对岳飞的猜忌；其三，帖内玩家直接引用“付鹏举”“忮忌”“阴湿鹏举”作为证据。官方处理三度反复：先将“付鹏举”改为“付鹏”却保留“忮忌”，被讥为“忮忌十六声”；随后删去“忮忌”又新增“性情极好，每事必究”，被指借内文再度阴阳；6月2日干脆把NPC与文案改回最初版本，被玩家认定为“知错不改、对抗到底”。截至本地窗口官方无正式声明。", "meta": ["燕云十六声", "网易", "文案影射"], "sources": [["S0360", "NGA · [新瓜]燕云新地图NPC文案使用“忮忌”，疑似阴阳民族英雄", "https://bbs.nga.cn/read.php?tid=46886352"], ["S0364", "NGA · 燕云十六岁新地图NPC文案改了，但没完全改", "https://bbs.nga.cn/read.php?tid=46889625"], ["S0419", "NGA · 忮忌十六声最终选择修改忮忌文案，但依旧阴阳玩家", "https://bbs.nga.cn/read.php?tid=46894302"], ["S0828", "NGA · 神了，忮忌十六声，又把npc和文案改回最初版本", "https://bbs.nga.cn/read.php?tid=46909443"]]}, {"section": "discourse", "title": "《重返未来：1999》三周年PV被冲240万条评论，制作组发长文致歉", "body": "蓝色破晓4月30日推送《重返未来：1999》3.7版本（三周年版本）后，积压已久的玩家不满集中爆发，该版本PV最终被冲超240万条评论，创下二游社区历史记录，超过《明日方舟》多索雷斯的100万与《鸣潮》二周年的60万。玩家不满集中在多重叠加：周年限定角色“小瑞安侬”被指对高人气角色梅蕾尔的“替身夺舍/背刺”，高人气角色“37”迟迟不加强却长期充当“带货工具人”，以及周年首次推出限时累充与绝版外观的激进商业化同时无视旧诉求。5月29日制作组发布长文致歉，承诺下调高难玩法资源门槛、新增助战模式、年内实装37强化，并补偿皮肤自选箱与30抽券。NGA社区随后分化：部分认为“给补偿是赚的”，另一部分质疑“隔了一个半月、流水腰斩才低头，诚意不足”。", "meta": ["重返未来1999", "蓝色破晓", "周年争议"], "sources": [["S0298", "NGA · [1999]重返未来1999就周年庆问题进行回应", "https://bbs.nga.cn/read.php?tid=46877620"], ["S0441", "GameLook · 《重返未来:1999》被玩家冲了240万条评论，制作组长文致歉", "http://www.gamelook.com.cn/2026/06/594392/"], ["S0366", "NGA · [1999]周年庆问题回应（续）", "https://bbs.nga.cn/read.php?tid=46877620"]]}, {"section": "discourse", "title": "《洛克王国 世界》女角色“鸭子坐”动作差分引发性别争议，官方删改反复", "body": "《洛克王国 世界》女角色（女洛）的“鸭子坐”坐姿动作差分在5月引爆性别争议：小红书一方认为女角色不该用这一姿势、要求官方删除或改成其他动作（甚至主张“该给男洛”），被NGA等处的男性玩家讥为“对男性的物化与双标”。官方处理上“删了又加回来”——一度删掉女洛的鸭子坐、随后又加回，结果两头不讨好，相关话题在小红书被大量灌评（NGA 称约1.1万条、戏称“7倍杀多索雷斯”）。争议还衍生出两条支线：男洛被指存在“露出小巧思”、被NGA框为官方“媚女/物化男洛”；以及腾讯以“制造男女对立”为由举报下架B站玩家投稿的宝可梦“鸭子坐”视频，被讥为“堵嘴”。多名玩家指出，节奏的真正内核其实是版本BUG、精灵生态等游戏内问题，性别议题只是抓手。官方靠发放约12个十连量级的补偿压下节奏，却始终未兑现“直播回应”；5月28日起游戏流水跌出畅销榜前20、总榜约第31名，玩家就“无氪金点所以下滑正常”与“S1长线运营方案已失败”激烈争论。", "meta": ["洛克王国世界", "腾讯", "性别争议"], "sources": [["S0293", "NGA · 洛世界加回鸭子坐被xhs冲了1.1w，7倍杀多索雷斯", "https://bbs.nga.cn/read.php?tid=46857960"], ["S0415", "NGA · 疑似物化男洛的媚女小巧思被集美们发现了", "https://bbs.nga.cn/read.php?tid=46854118"], ["S0163", "NGA · UP主投稿宝可梦角色鸭子坐视频被腾讯举报下架", "https://bbs.nga.cn/read.php?tid=46873571"], ["S0294", "NGA · 洛克王国这一波是怎么收场的？", "https://bbs.nga.cn/read.php?tid=46879621"], ["S0417", "NGA · 洛克王国流水28号已跌到20名开外", "https://bbs.nga.cn/read.php?tid=46893780"]]}, {"section": "deep", "title": "微信小游戏5亿MAU：真正的增量已经在PC端", "body": "微信小游戏走到第九年，5亿月活宣告移动端大盘进入成熟期——IAA池子里4亿人、七成只玩免费游戏，付费深度天花板越来越清晰。与此同时PC端值得单独标记：40%是从不碰移动端的PC独占用户，付费用户ARPU同比增130%、在线时长增100%。这与《黑神话：悟空》以来PC硬件市场的升温形成互证——PC侧正在出现一批真正愿意为小游戏付费、且粘性更高的独立用户群，平台也为此额外让出10%专属广告金。换言之，移动与PC在小游戏生态里已不是简单的“大屏版”和“手机版”，而是用户偏好分层的两个市场，单一押注移动的增长逻辑需要被重新推演。", "meta": ["微信小游戏", "PC增量", "结构观察"], "sources": [["S0006", "GameLook · 微信李卿：小游戏月活用户破5亿", "http://www.gamelook.com.cn/2026/05/594104/"], ["S0003", "GameLook · 微信孟令刚：PC小游戏付费用户ARPU增长130%", "http://www.gamelook.com.cn/2026/05/594154/"], ["S0044", "腾讯新闻 · 微信小游戏：超300款单季度流水破千万", "https://new.qq.com/rain/a/20260528A05ZW300"]]}, {"section": "deep", "title": "国产搜打撤集中立项，赛道向硬核与轻量化两端分化", "body": "本周搜打撤赛道的信号格外密集：网易《破碎之地》制作人吴晓创业首曝俯视角PVE搜打撤《逃离动物城》，主打轻量化与养成差异化；搜打撤鼻祖、《逃离塔科夫》之父尼基塔公布130人团队打造的更硬核新作《Fragmentary Order》；Byte Barrel公布硬核战术末世射击《二氧化物》；腾讯在SPARK上继续迭代《暗区突围》S18新版与端游《暗区突围：无限》S5。这些信号共同勾勒出赛道的两端分化：一端是尼基塔式“宁可小众也要极致拟真”的硬核路线，一端是国产团队把PVE、俯视角、养成和轻量化糅进来的降门槛路线。多位从业者把PVE视为国内射击的主要空白——国际射击品类中PVE约占两成，国内远未达到，这正是吴晓等人此刻入场的判断依据。", "meta": ["搜打撤", "赛道分化", "深度观察"], "sources": [["S0676", "腾讯新闻 · 网易《破碎之地》制作人创业，带着搜打撤新游杀回来了！", "https://new.qq.com/rain/a/20260602A04YKU00"], ["S0208", "GameLook · 《塔科夫》制作人专访：新作《Fragmentary Order》更加硬核", "http://www.gamelook.com.cn/2026/05/594255/"], ["S0657", "机核 · Byte Barrel 硬核战术末世射击游戏《二氧化物》正式公布", "https://www.gcores.com/articles/215269"], ["S0001", "GameLook · SPARK2026腾讯游戏发布会", "http://www.gamelook.com.cn/2026/05/594077/"]]}];
    const sectionLabels = Object.fromEntries(sections.map(s => [s.id, s.label]));
    const sectionDescs = Object.fromEntries(sections.map(s => [s.id, s.desc]));
    const orderedSectionIds = sections.filter(s => s.id !== "all").map(s => s.id);
    let currentSection = "all";
    let compact = false;
    const nav = document.getElementById("nav");
    const content = document.getElementById("content");
    const sectionHead = document.getElementById("sectionHead");
    const search = document.getElementById("search");
    const empty = document.getElementById("empty");
    const drawer = document.getElementById("drawer");
    const overlay = document.getElementById("overlay");
    function matches(item, query) {
      if (!query) return true;
      const text = [item.title,item.body,item.meta.join(" "),item.sources.map(s => s.join(" ")).join(" ")].join(" ").toLowerCase();
      return text.includes(query.toLowerCase());
    }
    function isBorderline(m) {
      return /borderline/i.test(m);
    }
    function renderNav() {
      nav.innerHTML = "";
      sections.forEach(section => {
        const count = section.id === "all" ? items.length : items.filter(item => item.section === section.id).length;
        const button = document.createElement("button");
        button.dataset.section = section.id;
        if (section.id === currentSection) button.classList.add("active");
        button.innerHTML = `<span>${section.label}</span><span class="count">${count}</span>`;
        button.addEventListener("click", () => { currentSection = section.id; render(); });
        nav.appendChild(button);
      });
    }
    function renderItem(item) {
      const node = document.createElement("article");
      node.className = "item";
      node.dataset.section = item.section;
      const metaTags = item.meta.map(m => {
        const cls = isBorderline(m) ? "borderline" : "";
        return `<span class="${cls}">${m}</span>`;
      }).join("");
      const bodyMarkup = item.body_html || `<p>${item.body}</p>`;
      node.innerHTML = `<div class="item-top"><span class="tag">${sectionLabels[item.section]}</span></div><h3>${item.title}</h3>${bodyMarkup}<div class="meta-row">${metaTags}</div><button class="source-btn" type="button">查看来源 →</button>`;
      node.querySelector(".source-btn").addEventListener("click", () => openDrawer(item));
      return node;
    }
    function buildGrid(itemList) {
      const grid = document.createElement("section");
      grid.className = compact ? "grid compact" : "grid";
      itemList.forEach(item => grid.appendChild(renderItem(item)));
      return grid;
    }
    function buildSectionBlock(sectionId, itemList) {
      const block = document.createElement("div");
      block.className = "section-block";
      const banner = document.createElement("div");
      banner.className = "section-banner";
      banner.dataset.section = sectionId;
      banner.innerHTML = `<h2>${sectionLabels[sectionId]}</h2><span class="banner-count">${itemList.length} 条</span><span class="banner-desc">${sectionDescs[sectionId]}</span>`;
      block.appendChild(banner);
      block.appendChild(buildGrid(itemList));
      return block;
    }
    function render() {
      renderNav();
      const query = search.value.trim();
      const filtered = items.filter(item => (currentSection === "all" || item.section === currentSection) && matches(item, query));
      content.innerHTML = "";
      if (currentSection === "all") {
        sectionHead.style.display = "none";
        orderedSectionIds.forEach(sid => {
          const sectionItems = filtered.filter(it => it.section === sid);
          if (sectionItems.length > 0) content.appendChild(buildSectionBlock(sid, sectionItems));
        });
      } else {
        sectionHead.style.display = "flex";
        sectionHead.dataset.section = currentSection;
        document.getElementById("sectionTitle").textContent = sectionLabels[currentSection];
        document.getElementById("sectionDesc").textContent = sectionDescs[currentSection];
        content.appendChild(buildGrid(filtered));
      }
      empty.classList.toggle("visible", filtered.length === 0);
    }
    function openDrawer(item) {
      document.getElementById("drawerTitle").textContent = item.title;
      document.getElementById("drawerNote").textContent = item.body;
      document.getElementById("sourceList").innerHTML = item.sources.map(([id,name,url]) => {
        const safeUrl = String(url || "");
        const isHttp = /^https?:\/\//i.test(safeUrl);
        const linkAttrs = isHttp ? `href="${safeUrl}" target="_blank" rel="noopener noreferrer"` : "";
        const urlEl = isHttp
          ? `<a class="source-url" ${linkAttrs}>${safeUrl} ↗</a>`
          : `<span class="source-url">${safeUrl}</span>`;
        return `<div class="source-card"><strong>${id} · ${name}</strong>${urlEl}</div>`;
      }).join("");
      drawer.classList.add("open"); overlay.classList.add("open");
    }
    function closeDrawer() { drawer.classList.remove("open"); overlay.classList.remove("open"); }
    search.addEventListener("input", render);
    document.getElementById("printBtn").addEventListener("click", () => window.print());

    // Sidebar collapse — state persists in localStorage
    const app = document.getElementById("app");
    const SIDEBAR_KEY = "report-sidebar-collapsed";
    try { if (localStorage.getItem(SIDEBAR_KEY) === "1") app.classList.add("collapsed"); } catch (e) {}
    document.getElementById("sidebarToggle").addEventListener("click", () => {
      app.classList.toggle("collapsed");
      try { localStorage.setItem(SIDEBAR_KEY, app.classList.contains("collapsed") ? "1" : "0"); } catch (e) {}
    });
    document.getElementById("closeDrawer").addEventListener("click", closeDrawer);
    overlay.addEventListener("click", closeDrawer);
    document.getElementById("viewGrid").addEventListener("click", () => { compact = false; document.getElementById("viewGrid").classList.add("active"); document.getElementById("viewList").classList.remove("active"); render(); });
    document.getElementById("viewList").addEventListener("click", () => { compact = true; document.getElementById("viewList").classList.add("active"); document.getElementById("viewGrid").classList.remove("active"); render(); });
    render();
  </script>
</body>
</html>
